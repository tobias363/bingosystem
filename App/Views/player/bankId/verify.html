<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spilorama Deposit Payment</title>
    <link rel="stylesheet" type="text/css" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <link rel="stylesheet" type="text/css" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" />
    <script src="/vendors/bower_components/jquery/dist/jquery.min.js"></script>
    <style type="text/css">
        /* Base Styles */
        body {
            background: #812222;
            margin: 0;
            padding: 0;
        }

        .center-container {
            /* height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; */
            display: flex;
            flex-direction: column; /* Stack items vertically */
            justify-content: center;
            align-items: center;
            height: 100vh; /* or min-height: 100vh; */
            overflow: hidden; /* Prevent overflow */
        }

        .payment {
            border: 1px solid #f2f2f2;
            border-radius: 20px;
            background: #fff;
            width: 100%;
            max-width: 500px; /* Default max-width */
            padding: 20px;
            margin: 0 auto;
        }

        .payment_header {
            background: rgba(98, 190, 79, 255);
            padding: 20px;
            border-radius: 20px 20px 0 0;
            text-align: center;
        }

        .payment_header.orange {
            background: rgba(255, 102, 0, 1);
        }

        .check {
            margin: 0 auto;
            width: 50px;
            height: 50px;
            border-radius: 100%;
            background: #fff;
            text-align: center;
        }

        .check i {
            line-height: 50px;
            font-size: 30px;
            color: #62be4f;
        }

        .check.times i {
            color: rgba(255, 102, 0, 1);
        }

        .content {
            text-align: center;
            padding: 25px;
        }

        .content h1 {
            font-size: 25px;
            padding-top: 20px;
        }

        .content a {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 200px;
            height: 35px;
            color: #fff;
            border-radius: 30px;
            padding: 5px 10px;
            background: rgba(98, 190, 79, 255);
            transition: all 0.3s ease-in-out;
            text-decoration: none;
            margin: 0 auto;
        }

        .content a.orange {
            background: rgba(255, 102, 0, 1);
        }

        .content a:hover {
            background: #812222;
        }

        /* Spinner Styles */
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #7983ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: absolute;
            height: 80px;
            width: 80px;
            top: 50%;
            left: 50%;
            margin-left: -50px;
            margin-top: -50px;
            background-size: 100%;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Media Queries */

        /* iPad Pro (1024x1366) - Specific to iPad Pro only */
        @media only screen and (min-width: 1024px) and (max-width: 1366px) and (min-height: 1024px) and (max-height: 1366px) {
            .payment {
                max-width: 800px !important; /* Set the payment box width */
                padding: 30px;
            }

            .payment_header {
                padding: 30px; /* Increase header padding */
            }

            .check {
                width: 70px; /* Increase check icon size */
                height: 70px;
            }

            .check i {
                font-size: 40px; /* Increase icon size */
                line-height: 70px; /* Adjust line height for centering */
            }

            .content h1 {
                font-size: 32px; /* Increase heading size */
            }

            .content p {
                font-size: 18px; /* Increase paragraph text size */
            }

            .content a {
                font-size: 18px; /* Increase button text size */
                padding: 15px; /* Increase button padding */
            }
        }

        /* Tablets (768px and below) */
        @media (max-width: 768px) {
            .content h1 {
                font-size: 20px;
            }

            .content a {
                font-size: 14px;
                padding: 10px; /* Adjust padding for smaller screens */
            }
        }

        /* Small Devices (576px and below) */
        @media (max-width: 576px) {
            .payment {
                border-radius: 15px;
            }

            .payment_header {
                padding: 15px;
            }

            .check {
                width: 40px;
                height: 40px;
            }

            .check i {
                font-size: 24px;
                line-height: 40px;
            }

            .content a {
                font-size: 12px;
                padding: 8px; /* Further adjust padding for even smaller screens */
            }
        }

        /* Extra Small Devices (360px and below) */
        @media (max-width: 360px) {
            .payment {
                max-width: 90%; /* Make it take 90% of the screen width */
                padding: 10px; /* Reduce padding for a better fit */
            }

            .payment_header {
                padding: 10px; /* Reduce header padding */
            }

            .content h1 {
                font-size: 16px; /* Reduce the heading size for smaller screens */
            }

            .content p {
                font-size: 12px; /* Adjust paragraph text size */
            }

            .content a {
                font-size: 12px; /* Reduce button text size */
                padding: 8px; /* Adjust button padding for smaller devices */
            }

            .check {
                width: 30px; /* Reduce the size of the check icon container */
                height: 30px;
            }

            .check i {
                font-size: 20px; /* Scale down the icon size */
                line-height: 30px; /* Center-align the icon */
            }
        }
    </style>
</head>
<body>
    <div class="container center-container">
        {% if (status == "pending") %}
        <div class="spinner-container">
            <div class="spinner"></div>
        </div>
        <iframe src="{{url}}" width="100%" height="500px"></iframe>
        <!-- <script defer src="{{url}}"></script> -->
        {% else %}
        <div class="row paymentRow">
            <div class="col-md-10 mx-auto">
                {% if (status == "success") %}
                <div class="payment">
                    <div class="payment_header">
                        <div class="check"><i class="fa fa-check" aria-hidden="true"></i></div>
                    </div>
                    <div class="content">
                        <h1>{{title}}</h1>
                        <p>{{message}}</p>
                        <a href="#" class="btn btn-primary gotoApp">{{goBack}}</a>
                    </div>
                </div>
                {% else %}
                <div class="payment">
                    <div class="payment_header orange">
                        <div class="check times"><i class="fa fa-exclamation" aria-hidden="true"></i></div>
                    </div>
                    <div class="content">
                        <h1>{{title}}</h1>
                        <p>{{message}}</p>
                        <a href="#" class="btn btn-primary gotoApp orange">{{goBack}}</a>
                    </div>
                </div>
                {% endif %}
            </div>
        </div>
        {% endif %}

        {% if (status == "pending") %}
        <script>
            function hideSpinner() {
                const spinner = document.querySelector('.spinner');
                spinner.style.display = 'none';
            }

            $(window).on('load', function () {
                hideSpinner();
            });
        </script>
        {% else %}
       
        {% endif %}
    </div>
</body>
</html>
