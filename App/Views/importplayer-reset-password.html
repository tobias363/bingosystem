<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{ App.name }}</title>
    <meta name="description" content="" />
    <meta name="keywords" content="" />
    <meta name="author" content="{{ App.name }}" />
    <!-- Tell the browser to be responsive to screen width -->
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <!-- Favicon -->
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <!-- Bootstrap 3.3.7 -->
    <link rel="stylesheet" href="/vendors/bower_components/bootstrap/dist/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="/vendors/bower_components/font-awesome/css/font-awesome.min.css">
    <!-- Ionicons -->
    <link rel="stylesheet" href="/vendors/bower_components/Ionicons/css/ionicons.min.css">
    <!-- Theme style -->
    <link rel="stylesheet" href="/dist/css/AdminLTE.min.css">
    <!-- iCheck -->
    <link rel="stylesheet" href="/vendors/iCheck/square/blue.css">

    <!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
  <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
  <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
  <![endif]-->

    <!-- Google Font -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,600,700,300italic,400italic,600italic">
    <style>
        @media (max-width: 600px) {
            .password-success td {
                padding: 15px 10px;
            }
    
            .password-success h2 {
                font-size: 18px;
            }
    
            .password-success p {
                font-size: 12px;
            }
        }
    </style>
</head>

<body class="hold-transition login-page">
    <div class="login-box">
        <div class="login-logo">
            <!-- <img class="brand-img mr-10" src="dist/img/logo.png" alt="brand" width="50px" height="50px" /> -->
            <a href="/"><b>Bingo Game</a>
        </div>
        <!-- /.login-logo -->
        <div class="login-box-body">
            <h3 class="text-center txt-dark mb-10 login-box-msg">Reset Password</h3>

            <!-- Alert if error while loggin in -->
            {% include "partition/notification.html" %}

            <form id="resePassword" class="">
                <input type="hidden" name="id" value="{{user.id}}">

                <div id="ctrErrorContainer" class="hidden alert alert-danger" role="alert"></div>
                <div id="ctrSuccessContainer" class="hidden alert alert-success" role="alert"></div>

                <div class="form-group has-feedback">
                    <input type="password" class="form-control" id="pass_confirmation" name="pass_confirmation" data-minlength="6" data-validation="length" data-validation-length="min6" placeholder="New Password">
                    <span class="glyphicon glyphicon-lock form-control-feedback"></span>
                </div>

                <div class="form-group has-feedback">
                    <input type="password" class="form-control" id="pass" name="pass" data-minlength="6" data-validation="confirmation" data-validation-length="min6" placeholder="Confirm Password">
                    <span class="glyphicon glyphicon-lock form-control-feedback"></span>
                </div>

                <div class="row">
                    <div class="col-xs-6">
                        <button type="submit" class="btn btn-primary btn-block btn-flat contrSubmit">Reset Password</button>
                    </div>
                </div>
            </form>

            <table class="password-success hidden" cellpadding="0" cellspacing="0" style="margin:0px auto;box-shadow: 0px 0px 15px rgba(194,194,194,0.5);border-bottom-left-radius: 10px;border-bottom-right-radius:10px;font-family: Arial, Helvetica, sans-serif;width: 100%;max-width: 340px;">
                <tr>
                    <td style="text-align: center;background: #2e0000;padding: 10px 15px;border-top-left-radius: 10px;border-top-right-radius:10px;">
                        <img src="/dist/img/checked.png" style="max-width: 100%; height: auto;">
                    </td>
                </tr>
                <tr>
                    <td style="padding:25px 15px;text-align: center;">
                        <h2 class="pass-reset-title">{{title}}</h2>
                        <p class="pass-reset-message" style="font-weight: bold;margin:10px 0px;font-size: 14px;">{{message}}</p>
                        <h2 style="margin-bottom: 0px;">Thank you</h2>
                    </td>
                </tr>
            </table>

        </div>
        <!-- /.login-box-body -->
    </div>
    <!-- /.login-box -->

    <!-- jQuery 3 -->
    <script src="/vendors/bower_components/jquery/dist/jquery.min.js"></script>
    <!-- Bootstrap 3.3.7 -->
    <script src="/vendors/bower_components/bootstrap/dist/js/bootstrap.min.js"></script>
    <!-- iCheck -->
    <script src="/vendors/iCheck/icheck.min.js"></script>
    <!-- Form validator -->
    <script src="//cdnjs.cloudflare.com/ajax/libs/jquery-form-validator/2.3.26/jquery.form-validator.min.js"></script>
    <script>
        $(function() {
            $.validate({
                modules: 'security',
                onModulesLoaded: function() {
                    // Show strength of password
                    $('input[name="pass_confirmation"]').displayPasswordStrength();
                }
            });

            $('#resePassword').on('submit', function (event) {
                event.preventDefault();
                // Disable the submit button
                $('.contrSubmit').prop('disabled', true);
                const pass_confirmation = $("#pass_confirmation").val()
                const pass = $("#pass").val()
                console.log('reset password:', pass_confirmation, pass);

                // Make AJAX call
                $.ajax({
                    url: '/player/reset-password/{{user.otherData.importPlayerResetPasswordToken}}',
                    method: 'POST',
                    data: { pass_confirmation: pass_confirmation, pass: pass, id: "{{user.id}}", email: "{{user.email}}", hall: "{{user.hall.id}}"  },
                    success: function (response) {
                        if (response.status == "success") {
                            $(".pass-reset-title").text(response.title);
                            $(".pass-reset-message").text(response.message);
                            $("#resePassword").addClass("hidden");
                            $('.password-success').removeClass('hidden');
                        } else {
                            console.log("inside error")
                            $('#ctrErrorContainer').html(response.message);
                            $('#ctrErrorContainer').removeClass('hidden');
                            setTimeout(function () {
                                $('#resePassword')[0].reset();
                                $('#ctrErrorContainer').addClass('hidden');
                            }, 5000);
                        }
                    }, complete: function () {
                        $('.contrSubmit').prop('disabled', false);
                    }
                });

                });



        });
    </script>
</body>

</html>
