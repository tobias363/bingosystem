              properties:
                durationMinutes:
                  type: integer
                  default: 15
                  minimum: 1
      responses:
        "200":
          description: Updated compliance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
    delete:
      tags: [Spillevett]
      summary: Cancel an active timed pause
      responses:
        "200":
          description: Updated compliance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

  /api/wallet/me/self-exclusion:
    post:
      tags: [Spillevett]
      summary: Activate 1-year self-exclusion (pengespillforskriften § 23)
      responses:
        "200":
          description: Updated compliance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
    delete:
      tags: [Spillevett]
      summary: Lift self-exclusion (only after exclusion period ends)
      responses:
        "200":
          description: Updated compliance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

