                totalDropSafe: { type: number }
                settlementNote: { type: string }
                isForceRequested: { type: boolean }
                otherData: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Settlement opprettet
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AgentSettlement" }
        "400":
          description: NO_ACTIVE_SHIFT / SHIFT_SETTLED / DIFF_NOTE_REQUIRED / ADMIN_FORCE_REQUIRED
