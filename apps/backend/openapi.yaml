openapi: "3.1.0"
info:
  title: Spillorama Bingo API
  version: "0.1.0"
  description: |
    Backend API for the Spillorama bingo platform.

    **Authentication**: All player and admin endpoints (except `/api/auth/login`,
    `/api/auth/register`, and Swedbank webhooks) require a Bearer token in the
    `Authorization` header obtained from the login or register endpoints.

    **Error shape**: All errors return `{ ok: false, error: { code, message } }`.
    Success responses return `{ ok: true, data: <payload> }`.

servers:
  - url: http://localhost:4000
    description: Local development
  - url: https://api.spillorama.no
    description: Production

tags:
  - name: Auth
    description: Authentication, profile management, and session handling
  - name: KYC
    description: Identity verification (BankID and manual)
  - name: Games
    description: Available games, halls, rooms, and leaderboard
  - name: Wallet
    description: Player wallet, top-ups, and transfers
  - name: Spillevett
    description: Responsible gaming — reports, loss limits, pauses, self-exclusion
  - name: Payments
    description: Swedbank Pay payment intents and callbacks
  - name: Admin — Auth
    description: Admin login, bootstrap, RBAC
  - name: Admin — Games
    description: Game settings, rooms, draw control
  - name: Admin — Halls
    description: Hall and terminal management, spilleplan
  - name: Admin — Compliance
    description: Player compliance, prize policy, payout audit
  - name: Admin — Ledger
    description: Compliance ledger entries and daily reports
  - name: Admin — Overskudd
    description: Surplus distribution to organisations (pengespillforskriften)

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  schemas:
    ApiSuccess:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          description: Endpoint-specific payload

    ApiError:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: INVALID_INPUT
            message:
              type: string
              example: E-post er påkrevd.

    Session:
      type: object
      properties:
        accessToken:
          type: string
        userId:
          type: string
        email:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [player, operator, support, admin]
        walletId:
          type: string

    AppUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
        surname:
          type: string
        phone:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date
          nullable: true
        role:
          type: string
        walletId:
          type: string
        kycStatus:
          type: string
          enum: [PENDING, VERIFIED, REJECTED]
        kycVerifiedAt:
          type: string
          format: date-time
          nullable: true

    WalletAccount:
      type: object
      properties:
        id:
          type: string
        balance:
          type: number
        currency:
          type: string
          example: NOK
        createdAt:
          type: string
          format: date-time

    WalletTransaction:
      type: object
      properties:
        id:
          type: string
        walletId:
          type: string
        type:
          type: string
          enum: [TOPUP, WITHDRAWAL, STAKE, PRIZE, REFUND, TRANSFER_IN, TRANSFER_OUT]
        amount:
          type: number
        reason:
          type: string
        createdAt:
          type: string
          format: date-time

    PlayerCompliance:
      type: object
      properties:
        walletId:
          type: string
        canPlay:
          type: boolean
        selfExcluded:
          type: boolean
        timedPauseUntil:
          type: string
          format: date-time
          nullable: true
        dailyLossLimit:
          type: number
          nullable: true
        monthlyLossLimit:
          type: number
          nullable: true

    AppGame:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        isEnabled:
          type: boolean

    Hall:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        orgNumber:
          type: string
        settlementAccount:
          type: string
        isActive:
          type: boolean

    RoomSummary:
      type: object
      properties:
        code:
          type: string
        gameSlug:
          type: string
        gameStatus:
          type: string
          enum: [NONE, WAITING, RUNNING, ENDED]
        status:
          type: string
          enum: [OPEN, PLAYING, WAITING, ENDED]
        hallId:
          type: string
          nullable: true
        nextRoundAt:
          type: string
          format: date-time
          nullable: true

    ScheduleSlot:
      type: object
      properties:
        id:
          type: string
        hallId:
          type: string
        gameSlug:
          type: string
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
          description: "0=Sunday, 1=Monday, …, 6=Saturday"
        startTime:
          type: string
          example: "19:00"
        isActive:
          type: boolean

    SwedbankIntent:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        walletId:
          type: string
        amountMajor:
          type: number
        status:
          type: string
          enum: [PENDING, PAID, FAILED, CANCELLED]
        paymentUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    LeaderboardEntry:
      type: object
      properties:
        nickname:
          type: string
        displayName:
          type: string
        points:
          type: number

security:
  - BearerAuth: []

paths:

  # ── Auth ──────────────────────────────────────────────────────────────────

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new player account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, displayName, surname, birthDate]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 12
                  description: Min 12 chars, must include uppercase, lowercase, and digit
                displayName:
                  type: string
                surname:
                  type: string
                birthDate:
                  type: string
                  format: date
                phone:
                  type: string
                complianceData:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Account created — returns session token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Session"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Session token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Session"
        "401":
          description: Wrong credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current session token
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          loggedOut:
                            type: boolean

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Issue a new token, invalidate the current one
      responses:
        "200":
          description: New session
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Session"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get the authenticated user's profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AppUser"
    put:
      tags: [Auth]
      summary: Update display name, email, or phone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AppUser"
    delete:
      tags: [Auth]
      summary: Delete the authenticated player's account
      responses:
        "200":
          description: Account deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          deleted:
                            type: boolean

  /api/auth/change-password:
    post:
      tags: [Auth]
      summary: Change password (requires current password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 12
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          changed:
                            type: boolean

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email (always returns success to prevent user enumeration)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Always succeeds
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          sent:
                            type: boolean

  # ── KYC ──────────────────────────────────────────────────────────────────

  /api/kyc/me:
    get:
      tags: [KYC]
      summary: Get the authenticated player's KYC status
      responses:
        "200":
          description: KYC status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          userId:
                            type: string
                          status:
                            type: string
                            enum: [PENDING, VERIFIED, REJECTED]
                          birthDate:
                            type: string
                            format: date
                            nullable: true
                          verifiedAt:
                            type: string
                            format: date-time
                            nullable: true
                          providerReference:
                            type: string
                            nullable: true

  /api/kyc/verify:
    post:
      tags: [KYC]
      summary: Submit manual KYC verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [birthDate]
              properties:
                birthDate:
                  type: string
                  format: date
                nationalId:
                  type: string
                  description: Norwegian national identity number (personnummer) — redacted in logs
      responses:
        "200":
          description: Verification submitted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/AppUser"

  /api/auth/bankid/init:
    post:
      tags: [KYC]
      summary: Start a BankID verification session
      responses:
        "200":
          description: BankID session created (or NOT_CONFIGURED if BankID is not wired up)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          sessionId:
                            type: string
                          authUrl:
                            type: string
                            nullable: true
                          status:
                            type: string
                            enum: [PENDING, NOT_CONFIGURED]

  /api/auth/bankid/status/{sessionId}:
    get:
      tags: [KYC]
      summary: Poll BankID verification status
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          sessionId:
                            type: string
                          status:
                            type: string
                            enum: [COMPLETE, PENDING, NOT_CONFIGURED]
                          verified:
                            type: boolean

  # ── Games & Rooms ─────────────────────────────────────────────────────────

  /api/games:
    get:
      tags: [Games]
      summary: List all enabled games
      responses:
        "200":
          description: Game list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AppGame"

  /api/games/status:
    get:
      tags: [Games]
      summary: Live status per game slug — used by lobby for Open/Starting/Closed badges
      responses:
        "200":
          description: Map of slug → status entry
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        additionalProperties:
                          type: object
                          properties:
                            status:
                              type: string
                              enum: [OPEN, STARTING, CLOSED]
                            nextRoundAt:
                              type: string
                              format: date-time
                              nullable: true

  /api/games/{slug}/launch:
    post:
      tags: [Games]
      summary: Launch an external game (e.g. Candy) — returns an embed URL
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                hallId:
                  type: string
                returnUrl:
                  type: string
                  format: uri
      responses:
        "200":
          description: Embed URL
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          embedUrl:
                            type: string
                          expiresAt:
                            type: string
                            format: date-time
                            nullable: true

  /api/halls:
    get:
      tags: [Games]
      summary: List active bingo halls
      responses:
        "200":
          description: Hall list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Hall"

  /api/halls/{hallId}/schedule:
    get:
      tags: [Games]
      summary: Today's game schedule for a hall (§ 64 spilleplan)
      parameters:
        - in: path
          name: hallId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Today's schedule slots
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ScheduleSlot"

  /api/rooms:
    get:
      tags: [Games]
      summary: List active rooms (optionally filtered by hallId)
      security: []
      parameters:
        - in: query
          name: hallId
          schema:
            type: string
      responses:
        "200":
          description: Room list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/RoomSummary"

  /api/rooms/{roomCode}:
    get:
      tags: [Games]
      summary: Get full room snapshot
      parameters:
        - in: path
          name: roomCode
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Room snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

  /api/rooms/{roomCode}/game/end:
    post:
      tags: [Games]
      summary: End the current game round in a room
      parameters:
        - in: path
          name: roomCode
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actorPlayerId]
              properties:
                actorPlayerId:
                  type: string
                reason:
                  type: string
      responses:
        "200":
          description: Updated room snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

  /api/rooms/{roomCode}/game/extra-draw:
    post:
      tags: [Games]
      summary: Reject an extra-draw purchase request for a player
      parameters:
        - in: path
          name: roomCode
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actorPlayerId]
              properties:
                actorPlayerId:
                  type: string
                requestedCount:
                  type: integer
                packageId:
                  type: string
      responses:
        "200":
          description: Rejection recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

  /api/leaderboard:
    get:
      tags: [Games]
      summary: Prize leaderboard (top 50)
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [today, week, month]
            default: week
        - in: query
          name: hallId
          schema:
            type: string
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/LeaderboardEntry"

  /api/notifications:
    get:
      tags: [Games]
      summary: List player notifications (stub — returns empty array in V1)
      responses:
        "200":
          description: Notification list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

  /api/notifications/read:
    post:
      tags: [Games]
      summary: Mark notifications as read
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

  # ── Wallet ────────────────────────────────────────────────────────────────

  /api/wallet/me:
    get:
      tags: [Wallet]
      summary: Get authenticated player's wallet account and last 20 transactions
      responses:
        "200":
          description: Wallet data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          account:
                            $ref: "#/components/schemas/WalletAccount"
                          transactions:
                            type: array
                            items:
                              $ref: "#/components/schemas/WalletTransaction"

  /api/wallet/me/transactions:
    get:
      tags: [Wallet]
      summary: Get player transaction history
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 500
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/WalletTransaction"

  /api/wallet/me/compliance:
    get:
      tags: [Wallet]
      summary: Get player compliance status (can play, limits, exclusions)
      parameters:
        - in: query
          name: hallId
          schema:
            type: string
      responses:
        "200":
          description: Compliance status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PlayerCompliance"

  /api/wallet/me/topup:
    post:
      tags: [Wallet]
      summary: Top up the authenticated player's wallet (manual or simulated)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: number
                  minimum: 0.01
                provider:
                  type: string
                  enum: [manual, swedbank_simulated]
                  default: manual
      responses:
        "200":
          description: Transaction record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

  /api/wallets:
    get:
      tags: [Wallet]
      summary: List all wallet accounts (admin use)
      responses:
        "200":
          description: Account list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/WalletAccount"
    post:
      tags: [Wallet]
      summary: Create a wallet account
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                walletId:
                  type: string
                initialBalance:
                  type: number
                  default: 1000
      responses:
        "200":
          description: Created account
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WalletAccount"

  /api/wallets/{walletId}:
    get:
      tags: [Wallet]
      summary: Get a wallet account and last 20 transactions
      parameters:
        - in: path
          name: walletId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Wallet data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

  /api/wallets/{walletId}/transactions:
    get:
      tags: [Wallet]
      summary: List transactions for a wallet
      parameters:
        - in: path
          name: walletId
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
            maximum: 500
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

  /api/wallets/{walletId}/topup:
    post:
      tags: [Wallet]
      summary: Top up a specific wallet
      parameters:
