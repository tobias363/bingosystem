                  type: string
                dailyLossLimit:
                  type: number
                  minimum: 0
                monthlyLossLimit:
                  type: number
                  minimum: 0
      responses:
        "200":
          description: Updated compliance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

