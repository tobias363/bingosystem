openapi: "3.1.0"
info:
  title: Spillorama Bingo API
  version: "0.1.0"
  description: |
    Backend API for the Spillorama bingo platform.

    **Authentication**: All player and admin endpoints (except `/api/auth/login`,
    `/api/auth/register`, and Swedbank webhooks) require a Bearer token in the
    `Authorization` header obtained from the login or register endpoints.

    **Error shape**: All errors return `{ ok: false, error: { code, message } }`.
    Success responses return `{ ok: true, data: <payload> }`.

servers:
  - url: http://localhost:4000
    description: Local development
  - url: https://api.spillorama.no
    description: Production

tags:
  - name: Auth
    description: Authentication, profile management, and session handling
  - name: KYC
    description: Identity verification (BankID and manual)
  - name: Games
    description: Available games, halls, rooms, and leaderboard
  - name: Wallet
    description: Player wallet, top-ups, and transfers
  - name: Spillevett
    description: Responsible gaming — reports, loss limits, pauses, self-exclusion
  - name: Payments
    description: Swedbank Pay payment intents and callbacks
  - name: Admin — Auth
    description: Admin login, bootstrap, RBAC
  - name: Admin — Games
    description: Game settings, rooms, draw control
  - name: Admin — Halls
    description: Hall and terminal management, spilleplan
  - name: Admin — Compliance
    description: Player compliance, prize policy, payout audit
  - name: Admin — Ledger
    description: Compliance ledger entries and daily reports
  - name: Admin — Overskudd
    description: Surplus distribution to organisations (pengespillforskriften)
  - name: Payment Requests
    description: Manual cash/bank deposit + withdraw queue (player-side endpoints). BIN-586.
  - name: Admin — Payment Requests
    description: Hall-operator accept/reject for the manual deposit/withdraw queue. BIN-586.
  - name: Players
    description: Player-resource endpoints — profile, GDPR self-service account deletion. BIN-587 B2.1.
  - name: Admin — Users
    description: User-role and hall-assignment management. BIN-591.
  - name: Admin — Players
    description: Player KYC-moderation — list pending/rejected, approve, reject, resubmit, override. BIN-587 B2.2.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  schemas:
    ApiSuccess:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          description: Endpoint-specific payload

    ApiError:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: INVALID_INPUT
            message:
              type: string
              example: E-post er påkrevd.

    Session:
      type: object
      properties:
        accessToken:
          type: string
        userId:
          type: string
        email:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [player, operator, support, admin]
        walletId:
          type: string

    AppUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
        surname:
          type: string
        phone:
          type: string
          nullable: true
        birthDate:
          type: string
          format: date
          nullable: true
        role:
          type: string
        walletId:
          type: string
        kycStatus:
          type: string
          enum: [PENDING, VERIFIED, REJECTED]
        kycVerifiedAt:
          type: string
          format: date-time
          nullable: true

    WalletAccount:
      type: object
      properties:
        id:
          type: string
        balance:
          type: number
        currency:
          type: string
          example: NOK
        createdAt:
          type: string
          format: date-time

    WalletTransaction:
      type: object
      properties:
        id:
          type: string
        walletId:
          type: string
        type:
          type: string
          enum: [TOPUP, WITHDRAWAL, STAKE, PRIZE, REFUND, TRANSFER_IN, TRANSFER_OUT]
        amount:
          type: number
        reason:
          type: string
        createdAt:
          type: string
          format: date-time

    PlayerCompliance:
      type: object
      properties:
        walletId:
          type: string
        canPlay:
          type: boolean
        selfExcluded:
          type: boolean
        timedPauseUntil:
          type: string
          format: date-time
          nullable: true
        dailyLossLimit:
          type: number
          nullable: true
        monthlyLossLimit:
          type: number
          nullable: true

    AppGame:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        isEnabled:
          type: boolean

    Hall:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        orgNumber:
          type: string
        settlementAccount:
          type: string
        isActive:
          type: boolean

    RoomSummary:
      type: object
      properties:
        code:
          type: string
        gameSlug:
          type: string
        gameStatus:
          type: string
          enum: [NONE, WAITING, RUNNING, ENDED]
        status:
          type: string
          enum: [OPEN, PLAYING, WAITING, ENDED]
        hallId:
          type: string
          nullable: true
        nextRoundAt:
          type: string
          format: date-time
          nullable: true

    ScheduleSlot:
      type: object
      properties:
        id:
          type: string
        hallId:
          type: string
        gameSlug:
          type: string
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
          description: "0=Sunday, 1=Monday, …, 6=Saturday"
        startTime:
          type: string
          example: "19:00"
        isActive:
          type: boolean

    SwedbankIntent:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        walletId:
          type: string
        amountMajor:
          type: number
        status:
          type: string
          enum: [PENDING, PAID, FAILED, CANCELLED]
        paymentUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    LeaderboardEntry:
      type: object
      properties:
        nickname:
          type: string
        displayName:
          type: string
        points:
          type: number

    # ── Payment requests (BIN-586) ────────────────────────────────────────

    PaymentRequestKind:
      type: string
      enum: [deposit, withdraw]
      description: Whether the queued request is an incoming (deposit) or outgoing (withdraw) wallet move.

    PaymentRequestStatus:
      type: string
      enum: [PENDING, ACCEPTED, REJECTED]

    PaymentRequest:
      type: object
      required:
        [id, kind, userId, walletId, amountCents, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        kind:
          $ref: "#/components/schemas/PaymentRequestKind"
        userId:
          type: string
        walletId:
          type: string
        amountCents:
          type: integer
          minimum: 1
          description: Amount in minor units (øre). `10000` = 100 NOK.
        hallId:
          type: string
          nullable: true
          description: Hall where the request was submitted. HALL_OPERATOR is scoped to their own hall (BIN-591).
        submittedBy:
          type: string
          nullable: true
          description: User ID of the actor who submitted the request (terminal staff or the player themselves).
        status:
          $ref: "#/components/schemas/PaymentRequestStatus"
        rejectionReason:
          type: string
          nullable: true
        acceptedBy:
          type: string
          nullable: true
        acceptedAt:
          type: string
          format: date-time
          nullable: true
        rejectedBy:
          type: string
          nullable: true
        rejectedAt:
          type: string
          format: date-time
          nullable: true
        walletTransactionId:
          type: string
          nullable: true
          description: |
            Set once the request is ACCEPTED. Links to the ledger entry that
            credited (deposit) or debited (withdraw) the player's wallet.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DepositRequestInput:
      type: object
      required: [amountCents]
      properties:
        amountCents:
          type: integer
          minimum: 1
        hallId:
          type: string
          description: Optional. Required in practice when HALL_OPERATOR submits on behalf of a player.

    WithdrawRequestInput:
      allOf:
        - $ref: "#/components/schemas/DepositRequestInput"
      description: Same shape as deposit; amount is still positive, direction determined by endpoint.

    AcceptPaymentRequestInput:
      type: object
      required: [type]
      properties:
        type:
          $ref: "#/components/schemas/PaymentRequestKind"

    RejectPaymentRequestInput:
      type: object
      required: [type, reason]
      properties:
        type:
          $ref: "#/components/schemas/PaymentRequestKind"
        reason:
          type: string
          minLength: 1
          description: Human-readable rejection reason stored on the row for audit.

    # ── Auth (BIN-587 B2.1 — password reset, email verify) ────────────────

    PasswordResetTokenValid:
      type: object
      description: Returned by GET /api/auth/reset-password/{token} when the token is valid.
      required: [valid, userId]
      properties:
        valid:
          type: boolean
          enum: [true]
        userId:
          type: string

    ResetPasswordInput:
      type: object
      required: [newPassword]
      properties:
        newPassword:
          type: string
          minLength: 12

    # ── Players (BIN-587 B2.1) ────────────────────────────────────────────

    PlayerProfile:
      type: object
      required: [id, email, displayName, hallId, kycStatus, createdAt, updatedAt]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        surname:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        hallId:
          type: string
          description: Primary hall association.
        kycStatus:
          type: string
          enum: [PENDING, VERIFIED, REJECTED]
        birthDate:
          type: string
          format: date
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PlayerProfileUpdateInput:
      type: object
      description: All fields optional — only the supplied fields are updated.
      properties:
        displayName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string

    # ── Admin — Users (BIN-591) ───────────────────────────────────────────

    AdminUserHallAssignmentInput:
      type: object
      required: [hallId]
      properties:
        hallId:
          type: string
          nullable: true
          description: |
            Target hall-id for HALL_OPERATOR scoping. Pass `null` (or empty string)
            to clear the assignment. Only meaningful for HALL_OPERATOR — other
            roles ignore the field.

    # ── Admin — Players / KYC-moderation (BIN-587 B2.2) ───────────────────

    KycStatus:
      type: string
      enum: [UNVERIFIED, PENDING, VERIFIED, REJECTED]
      description: |
        Player KYC lifecycle. `UNVERIFIED` = aldri innsendt, `PENDING` = awaiting
        moderator, `VERIFIED` = godkjent, `REJECTED` = avvist (spiller kan sende
        på nytt hvis admin kaller `/resubmit`).

    PlayerSummary:
      type: object
      description: |
        Moderator-view of a player. Strips wallet/session-detaljer — bruk
        `/api/admin/wallets/...` for compliance-visning.
      required: [id, email, displayName, kycStatus, hallId, createdAt, updatedAt]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        surname:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        kycStatus:
          $ref: "#/components/schemas/KycStatus"
        birthDate:
          type: string
          format: date
          nullable: true
        kycVerifiedAt:
          type: string
          format: date-time
          nullable: true
        kycProviderRef:
          type: string
          nullable: true
          description: Provider-side referanse (BankID-sesjons-id el.l.) hvis tilgjengelig.
        hallId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        complianceData:
          type: object
          additionalProperties: true
          nullable: true
          description: Fri-formet metadata fra KYC-provider — rå payload for audit.

    PlayerDetail:
      allOf:
        - $ref: "#/components/schemas/PlayerSummary"
      description: Detail-response har for øyeblikket samme shape som summary; felt-sett kan utvides uten å bryte client-kontrakt.

    # Alias-navn for briefens terminologi — peker begge på PlayerSummary
    # siden list-endpoints bare differensierer via `kycStatus`-verdien.
    PendingPlayer:
      allOf:
        - $ref: "#/components/schemas/PlayerSummary"
      description: PlayerSummary der `kycStatus=PENDING`.

    RejectedPlayer:
      allOf:
        - $ref: "#/components/schemas/PlayerSummary"
      description: PlayerSummary der `kycStatus=REJECTED`.

    KYCApprovalInput:
      type: object
      description: Body for approve. Note-feltet er valgfritt og trimmes til maks 500 tegn før audit-log.
      properties:
        note:
          type: string
          maxLength: 500

    KYCRejectionInput:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 500
          description: Påkrevd. Persistert i audit-log og sendt til spilleren i rejection-e-post.

    KYCOverrideInput:
      type: object
      required: [status, reason]
      description: Admin-only override (PLAYER_KYC_OVERRIDE). Bypasser normal moderator-flyt; krever at `reason` dokumenterer hvorfor.
      properties:
        status:
          $ref: "#/components/schemas/KycStatus"
        reason:
          type: string
          minLength: 1
          maxLength: 500

    AuditActorType:
      type: string
      enum: [USER, ADMIN, HALL_OPERATOR, SUPPORT, PLAYER, SYSTEM]

    AuditLogEntry:
      type: object
      description: |
        Persistert audit-hendelse. Returneres av
        `GET /api/admin/players/{id}/audit` filtrert på `resource=user`.
      required: [id, actorType, action, resource, createdAt]
      properties:
        id:
          type: string
        actorId:
          type: string
          nullable: true
        actorType:
          $ref: "#/components/schemas/AuditActorType"
        action:
          type: string
          description: Stable dotted verb, f.eks. `player.kyc.approve`, `player.kyc.reject`, `player.kyc.override`.
        resource:
          type: string
          description: Entity kind, f.eks. `user`.
        resourceId:
          type: string
          nullable: true
        details:
          type: object
          additionalProperties: true
          description: Action-spesifikke felt (f.eks. `reason`, `newStatus`, `note`).
        ipAddress:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

security:
  - BearerAuth: []

paths:

  # ── Auth ──────────────────────────────────────────────────────────────────

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new player account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, displayName, surname, birthDate]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 12
                  description: Min 12 chars, must include uppercase, lowercase, and digit
                displayName:
                  type: string
                surname:
                  type: string
                birthDate:
                  type: string
                  format: date
                phone:
                  type: string
                complianceData:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Account created — returns session token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Session"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Session token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Session"
        "401":
          description: Wrong credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current session token
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          loggedOut:
                            type: boolean

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Issue a new token, invalidate the current one
      responses:
        "200":
          description: New session
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Session"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get the authenticated user's profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AppUser"
    put:
      tags: [Auth]
      summary: Update display name, email, or phone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AppUser"
    delete:
      tags: [Auth]
      summary: Delete the authenticated player's account
      responses:
        "200":
          description: Account deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          deleted:
                            type: boolean

  /api/auth/change-password:
    post:
      tags: [Auth]
      summary: Change password (requires current password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 12
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          changed:
                            type: boolean

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email (always returns success to prevent user enumeration)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Always succeeds
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          sent:
                            type: boolean

  # ── KYC ──────────────────────────────────────────────────────────────────

  /api/kyc/me:
    get:
      tags: [KYC]
      summary: Get the authenticated player's KYC status
      responses:
        "200":
          description: KYC status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          userId:
                            type: string
                          status:
                            type: string
                            enum: [PENDING, VERIFIED, REJECTED]
                          birthDate:
                            type: string
                            format: date
                            nullable: true
                          verifiedAt:
                            type: string
                            format: date-time
                            nullable: true
                          providerReference:
                            type: string
                            nullable: true

  /api/kyc/verify:
    post:
      tags: [KYC]
      summary: Submit manual KYC verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [birthDate]
              properties:
                birthDate:
                  type: string
                  format: date
                nationalId:
                  type: string
                  description: Norwegian national identity number (personnummer) — redacted in logs
      responses:
        "200":
          description: Verification submitted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/AppUser"

  /api/auth/bankid/init:
    post:
      tags: [KYC]
      summary: Start a BankID verification session
      responses:
        "200":
          description: BankID session created (or NOT_CONFIGURED if BankID is not wired up)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          sessionId:
                            type: string
                          authUrl:
                            type: string
                            nullable: true
                          status:
                            type: string
                            enum: [PENDING, NOT_CONFIGURED]

  /api/auth/bankid/status/{sessionId}:
    get:
      tags: [KYC]
      summary: Poll BankID verification status
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          sessionId:
                            type: string
                          status:
                            type: string
                            enum: [COMPLETE, PENDING, NOT_CONFIGURED]
                          verified:
                            type: boolean

  # ── Games & Rooms ─────────────────────────────────────────────────────────

  /api/games:
    get:
      tags: [Games]
      summary: List all enabled games
      responses:
        "200":
          description: Game list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AppGame"

  /api/games/status:
    get:
      tags: [Games]
      summary: Live status per game slug — used by lobby for Open/Starting/Closed badges
      responses:
        "200":
          description: Map of slug → status entry
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        additionalProperties:
                          type: object
                          properties:
                            status:
                              type: string
                              enum: [OPEN, STARTING, CLOSED]
                            nextRoundAt:
                              type: string
                              format: date-time
                              nullable: true

  /api/games/{slug}/launch:
    post:
      tags: [Games]
