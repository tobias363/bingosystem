        - 500 < |diff| ≤ 1000 (eller 5 < |%| ≤ 10) → note required
        - |diff| > 1000 (eller > 10 %) → ADMIN + isForceRequested + note required
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reportedCashCount]
