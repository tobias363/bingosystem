      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                walletId:
                  type: string
                initialBalance:
                  type: number
                  default: 1000
      responses:
        "200":
          description: Created account
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WalletAccount"

  /api/wallets/{walletId}:
    get:
      tags: [Wallet]
      summary: Get a wallet account and last 20 transactions
      parameters:
        - in: path
          name: walletId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Wallet data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

  /api/wallets/{walletId}/transactions:
    get:
