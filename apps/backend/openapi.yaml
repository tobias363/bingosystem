          schema:
            type: integer
            default: 50
            maximum: 500
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/WalletTransaction"

  /api/wallet/me/compliance:
    get:
      tags: [Wallet]
      summary: Get player compliance status (can play, limits, exclusions)
      parameters:
        - in: query
