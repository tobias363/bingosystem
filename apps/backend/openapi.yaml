  # ── Payment Requests — Player (BIN-586) ───────────────────────────────────

  /api/payments/deposit-request:
    post:
      tags: [Payment Requests]
      summary: Create a PENDING manual cash/bank deposit request
      description: |
        Queues a deposit request. The wallet is **not** credited until a
        HALL_OPERATOR accepts it via
        `POST /api/admin/payments/requests/{id}/accept`.

        Authentication: Bearer token (player). The userId and walletId are
        resolved from the token — the client does not pass them.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepositRequestInput"
      responses:
        "200":
          description: Pending request created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaymentRequest"
        "400":
          description: INVALID_INPUT — amountCents missing or not a positive integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/payments/withdraw-request:
    post:
      tags: [Payment Requests]
      summary: Create a PENDING manual withdraw request
      description: |
        Queues a withdraw request. The wallet is **not** debited until a
        HALL_OPERATOR accepts it. Current MVP pays out as cash at the hall;
        bank-transfer payout (Swedbank Payout) is not implemented.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawRequestInput"
      responses:
        "200":
          description: Pending request created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaymentRequest"
        "400":
          description: INVALID_INPUT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ── Payment Requests — Admin (BIN-586, BIN-591) ───────────────────────────

  /api/admin/payments/requests:
    get:
      tags: [Admin — Payment Requests]
      summary: List deposit/withdraw requests (filterable)
      description: |
        **RBAC:** `PAYMENT_REQUEST_READ` (ADMIN, HALL_OPERATOR, SUPPORT).
        **BIN-591 hall-scope:** if the caller is HALL_OPERATOR, the
        `hallId` filter is forcibly set to the operator's hall regardless
        of the query-string input.
      parameters:
        - in: query
          name: type
          required: false
          schema:
            $ref: "#/components/schemas/PaymentRequestKind"
        - in: query
          name: status
          required: false
          schema:
            $ref: "#/components/schemas/PaymentRequestStatus"
          description: Defaults to PENDING when omitted.
        - in: query
          name: hallId
          required: false
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: Sorted newest-first, mixed kinds allowed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          requests:
                            type: array
                            items:
                              $ref: "#/components/schemas/PaymentRequest"
        "403":
          description: FORBIDDEN — caller lacks PAYMENT_REQUEST_READ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/admin/payments/requests/{id}/accept:
    post:
      tags: [Admin — Payment Requests]
      summary: Accept a PENDING request and perform the wallet operation
      description: |
        **RBAC:** `PAYMENT_REQUEST_WRITE` (ADMIN, HALL_OPERATOR).
        **BIN-591 hall-scope:** HALL_OPERATOR may only accept requests
        bound to their own hall. Accepting a request with no `hall_id`
        (legacy rows) is forbidden for HALL_OPERATOR — fail-closed.

        Idempotent: the underlying wallet operation uses key
        `payment-request:{kind}:{id}`. Re-accepting an already-ACCEPTED
        request returns PAYMENT_REQUEST_ALREADY_RESOLVED.

        **HV2-A / BIR-036 (kontant-utbetaling-cap):** For
        `kind=withdraw` AND `destination_type=hall` håndheves en daglig
        kontant-cap på **50 000 kr/hall/dag** (Europe/Oslo-tidssone).
        Bank-overføringer (`destination_type=bank`) er **ikke** begrenset.
        Cap-en sjekkes både før wallet-debit (pre-flight) og atomisk
        etter (race-trygg). Audit-log-event `cash_withdrawal.cap_exceeded`
        skrives ved hver cap-overskridelse.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptPaymentRequestInput"
      responses:
        "200":
          description: Request accepted, wallet credited/debited
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          request:
                            $ref: "#/components/schemas/PaymentRequest"
        "400":
          description: |
            INSUFFICIENT_FUNDS (withdraw) or INVALID_INPUT or
            **CASH_WITHDRAW_CAP_EXCEEDED** (HV2-A / BIR-036) — daglig
            kontant-utbetaling-grense (50 000 kr/hall/dag) er nådd. Error
            `details` inneholder `hallId`, `businessDate`,
            `requestedAmountCents`, `remainingCapCents` og `capCents`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: FORBIDDEN — hall-scope violation or missing permission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: PAYMENT_REQUEST_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/admin/payments/requests/{id}/reject:
    post:
      tags: [Admin — Payment Requests]
      summary: Reject a PENDING request with a reason
      description: |
        **RBAC:** `PAYMENT_REQUEST_WRITE`. Same hall-scope rules as accept.
        Wallet is never touched on reject — the row's status, rejection
        reason, and rejected_by/rejected_at are persisted for audit.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectPaymentRequestInput"
      responses:
        "200":
          description: Request rejected
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          request:
                            $ref: "#/components/schemas/PaymentRequest"
        "403":
          description: FORBIDDEN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: PAYMENT_REQUEST_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ── Admin History (GAP #10 + #12) ────────────────────────────────────────

  /api/admin/deposits/history:
    get:
      tags: [Admin — Payment Requests]
      summary: Deposit history listing (GAP #10 — legacy /deposit/history)
      description: |
        **GAP #10** (BACKEND_1TO1_GAP_AUDIT_2026-04-24 §1.5): replaces legacy
        `GET /deposit/history` + `/deposit/history/get`. Returns ALL deposit
        rows (PENDING + ACCEPTED + REJECTED by default) with cursor-based
        pagination.

        **RBAC:** `PAYMENT_REQUEST_READ` (ADMIN, HALL_OPERATOR, SUPPORT).
        **Hall-scope:** HALL_OPERATOR is auto-restricted to own hall via
        `resolveHallScopeFilter` — overriding `?hallId=` to a different hall
        returns 400 FORBIDDEN.

        **CSV export:** `?format=csv` returns `text/csv; charset=utf-8` with
        UTF-8 BOM and CRLF line endings (Excel-NO compatible). CSV-mode
        skips pagination — up to 5000 rows are fetched in one batch.

        **Type filter (forward-compat):** `?type=hall` returns all rows
        (current data is cash-in-hall only); `?type=vipps` and `?type=card`
        return empty for now. This keeps the API stable for future
        Vipps/Card source-splits without client-side breakage.
      parameters:
        - in: query
          name: format
          required: false
          schema:
            type: string
            enum: [json, csv]
        - in: query
          name: fromDate
          required: false
          schema:
            type: string
            description: ISO-8601 date or datetime (YYYY-MM-DD shorthand allowed).
        - in: query
          name: toDate
          required: false
          schema:
            type: string
        - in: query
          name: hallId
          required: false
          schema:
            type: string
        - in: query
          name: status
          required: false
          schema:
            type: string
          description: |
            CSV-list of statuses (PENDING, ACCEPTED, REJECTED). Omit to
            include all three.
        - in: query
          name: type
          required: false
          schema:
            type: string
            enum: [hall, vipps, card, all]
        - in: query
          name: playerId
          required: false
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - in: query
          name: cursor
          required: false
          schema:
            type: string
            description: Opaque cursor from previous response's `nextCursor`.
      responses:
        "200":
          description: Sorted newest-first; `nextCursor` is `null` when no more rows.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: "#/components/schemas/PaymentRequest"
                          nextCursor:
                            type: [string, "null"]
            text/csv:
              schema:
                type: string
                description: |
                  CSV with UTF-8 BOM. Columns: id, kind, status, userId,
                  walletId, amountCents, hallId, destinationType,
                  submittedBy, acceptedBy, acceptedAt, rejectedBy, rejectedAt,
                  rejectionReason, walletTransactionId, createdAt, updatedAt.
        "400":
          description: INVALID_INPUT (bad date, status, type, limit, cursor) or FORBIDDEN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/admin/withdrawals/history:
    get:
      tags: [Admin — Payment Requests]
      summary: Withdraw history listing (GAP #12 — legacy /withdraw/history/{hall,bank})
      description: |
        **GAP #12** (BACKEND_1TO1_GAP_AUDIT_2026-04-24 §1.5): consolidates
        legacy `GET /withdraw/history/hall` + `/withdraw/history/bank` +
        `*/get` into one endpoint with `?type=hall|bank|all`. Returns ALL
        withdraw rows (PENDING + ACCEPTED + REJECTED by default) with
        cursor-based pagination.

        **RBAC:** `PAYMENT_REQUEST_READ` (ADMIN, HALL_OPERATOR, SUPPORT).
        **Hall-scope:** identical to deposits/history.

        **CSV export:** `?format=csv` returns `text/csv; charset=utf-8` with
        UTF-8 BOM and CRLF line endings.
      parameters:
        - in: query
          name: format
          required: false
          schema:
            type: string
            enum: [json, csv]
        - in: query
          name: type
          required: false
          schema:
            type: string
            enum: [hall, bank, all]
        - in: query
          name: fromDate
          required: false
          schema:
            type: string
        - in: query
          name: toDate
          required: false
          schema:
            type: string
        - in: query
          name: hallId
          required: false
          schema:
            type: string
        - in: query
          name: status
          required: false
          schema:
            type: string
        - in: query
          name: playerId
          required: false
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - in: query
          name: cursor
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Sorted newest-first; `nextCursor` null when no more rows.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: "#/components/schemas/PaymentRequest"
                          nextCursor:
                            type: [string, "null"]
            text/csv:
              schema:
                type: string
        "400":
          description: INVALID_INPUT or FORBIDDEN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ── Auth — Password Reset + Email Verify (BIN-587 B2.1) ───────────────────

  /api/auth/reset-password/{token}:
    get:
      tags: [Auth]
      summary: Validate a password-reset token (used by the UI before showing the new-password form)
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PasswordResetTokenValid"
        "400":
          description: TOKEN_INVALID or TOKEN_EXPIRED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      tags: [Auth]
      summary: Consume a password-reset token and set a new password
      description: |
        Consumes the token atomically (one-shot) and writes a new password
        hash. Existing sessions are revoked as a side effect of
        `platformService.setPassword`.
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          reset:
                            type: boolean
                            enum: [true]
        "400":
          description: TOKEN_INVALID, TOKEN_EXPIRED, or password too weak
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/verify-email/{token}:
    post:
      tags: [Auth]
      summary: Confirm a user's email address via the one-shot token from the sign-up email
      security: []
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          verified:
                            type: boolean
                            enum: [true]
        "400":
          description: TOKEN_INVALID or TOKEN_EXPIRED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ── Two-Factor (TOTP) — REQ-129 ──────────────────────────────────────────

  /api/auth/2fa/setup:
    post:
      tags: [Auth]
      summary: Initier TOTP-setup — returner secret + otpauth-URI for QR-rendring
      description: |
        Genererer en pending TOTP-secret. Klienten rendrer otpauth-URI som
        QR-kode (Google Authenticator). Pending secret aktiveres ved kall til
        `/api/auth/2fa/verify` med korrekt 6-sifret kode.
      responses:
        "200":
          description: Pending secret + otpauth URI
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          secret: { type: string }
                          otpauthUri: { type: string }

  /api/auth/2fa/verify:
    post:
      tags: [Auth]
      summary: Aktiver 2FA ved å verifisere første TOTP-kode + få 10 backup-codes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, pattern: "^\\d{6}$" }
      responses:
        "200":
          description: 2FA aktivert; 10 single-use backup-codes (10 sifre, vises bare denne ene gangen)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          enabled: { type: boolean, enum: [true] }
                          backupCodes:
                            type: array
                            items: { type: string, pattern: "^\\d{5}-\\d{5}$" }
        "400":
          description: INVALID_TOTP_CODE / TWO_FA_NO_PENDING_SETUP / TWO_FA_ALREADY_ENABLED
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /api/auth/2fa/login:
    post:
      tags: [Auth]
      summary: Fullfør 2FA-login med challengeId + TOTP-kode (eller backup-kode)
      description: |
        Etter at `/api/auth/login` returnerer `requires2FA: true` med en
        `challengeId`, sender klienten challengeId + 6-sifret TOTP-kode (eller
        10-sifret backup-kode) hit. Returnerer en gyldig session.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [challengeId, code]
              properties:
                challengeId: { type: string }
                code: { type: string }
      responses:
        "200":
          description: Sesjons-token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Session" }
        "400":
          description: INVALID_TWO_FA_CHALLENGE / INVALID_TOTP_CODE
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /api/auth/2fa/disable:
    post:
      tags: [Auth]
      summary: Deaktiver 2FA — krever passord OG TOTP-kode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, code]
              properties:
                password: { type: string }
                code: { type: string }
      responses:
        "200":
          description: 2FA deaktivert
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          disabled: { type: boolean, enum: [true] }
        "400":
          description: INVALID_CREDENTIALS / INVALID_TOTP_CODE / TWO_FA_NOT_ENABLED
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /api/auth/2fa/status:
    get:
      tags: [Auth]
      summary: Få nåværende 2FA-status for innlogget bruker
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          enabled: { type: boolean }
                          enabledAt: { type: [string, "null"], format: date-time }
                          backupCodesRemaining: { type: integer }
                          hasPendingSetup: { type: boolean }

  /api/auth/2fa/backup-codes/regenerate:
    post:
      tags: [Auth]
      summary: Regenerer backup-codes (krever passord). Gamle koder blir ugyldige.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string }
      responses:
        "200":
          description: 10 nye backup-codes
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          backupCodes:
                            type: array
                            items: { type: string }

  # ── Active sessions (REQ-132) ────────────────────────────────────────────

  /api/auth/sessions:
    get:
      tags: [Auth]
      summary: List aktive sesjoner for innlogget bruker
      description: |
        Returnerer sesjoner som ikke er revoked og ikke har utløpt. Den
        sesjonen som gjorde requesten markeres med `isCurrent: true`.
        Inactivity-timeout (30 min) håndheves implisitt — sesjoner som
        var inaktive > 30 min revokes ved første touchActivity-kall.
      responses:
        "200":
          description: Aktive sesjoner
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          sessions:
                            type: array
                            items:
                              type: object
                              properties:
                                id: { type: string }
                                userId: { type: string }
                                deviceUserAgent: { type: [string, "null"] }
                                ipAddress: { type: [string, "null"] }
                                lastActivityAt: { type: string, format: date-time }
                                createdAt: { type: string, format: date-time }
                                expiresAt: { type: string, format: date-time }
                                isCurrent: { type: boolean }

  /api/auth/sessions/logout-all:
    post:
      tags: [Auth]
      summary: "Logg ut alle sesjoner (default: behold gjeldende)"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                includeCurrent:
                  type: boolean
                  default: false
                  description: Hvis true logges også gjeldende sesjon ut.
      responses:
        "200":
          description: Antall sesjoner som ble revoked
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          count: { type: integer }

  /api/auth/sessions/{id}/logout:
    post:
      tags: [Auth]
      summary: Logg ut en spesifikk sesjon (må eies av innlogget bruker)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Logget ut
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          loggedOut: { type: boolean, enum: [true] }
        "400":
          description: SESSION_NOT_FOUND
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  # ── Players (BIN-587 B2.1) ────────────────────────────────────────────────

  /api/players/me/profile:
    get:
      tags: [Players]
      summary: Get the authenticated player's profile-view fields
      description: |
        Returns only fields the player is allowed to see and edit. Password,
        compliance, and internal flags are excluded — use `/api/auth/me`
        for the fuller auth view, and admin endpoints for compliance.
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PlayerProfile"
    put:
      tags: [Players]
      summary: Update the authenticated player's display name, email, or phone
      description: |
        Only the fields present in the request body are updated. Writes an
        `player.profile.update` entry to the audit log (fire-and-forget).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerProfileUpdateInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AppUser"
        "400":
          description: INVALID_INPUT (e.g. malformed email)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/players/me:
    delete:
      tags: [Players]
      summary: GDPR self-service account deletion (soft-anonymize)
      description: |
        Same semantics as `DELETE /api/auth/me` but lives under the player
        resource so the admin roadmap can evolve them independently. Writes
        a `account.self_delete` audit entry with `reason="gdpr-self-service"`
        and a **redacted** email-domain marker only — the plaintext email is
        never persisted in the audit trail.
      responses:
        "200":
          description: Account deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          deleted:
                            type: boolean
                            enum: [true]

  # ── Admin — Users (BIN-591) ───────────────────────────────────────────────

  /api/admin/users/{userId}/hall:
    put:
      tags: [Admin — Users]
      summary: Assign or clear the primary hall for a user (HALL_OPERATOR scoping)
      description: |
        **RBAC:** `USER_ROLE_WRITE` (ADMIN only). Pass `hallId: null` or an
        empty string to clear the assignment. Only relevant for
        HALL_OPERATOR — other roles ignore the field, but the endpoint is
        callable for any user id the caller can manage.

        Writes a `user.hall.assign` audit-log entry with the actor, target
        user, and the new hall id.
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserHallAssignmentInput"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AppUser"
        "400":
          description: INVALID_INPUT — hallId is neither a string nor null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: FORBIDDEN — caller lacks USER_ROLE_WRITE
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: USER_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ── Admin — Players / KYC-moderation (BIN-587 B2.2) ───────────────────────

  /api/admin/players/pending:
    get:
      tags: [Admin — Players]
      summary: List players whose KYC is awaiting moderator review
      description: |
        **RBAC:** `PLAYER_KYC_READ` (ADMIN, HALL_OPERATOR, SUPPORT). Returns
        players with `kycStatus = PENDING`, ordered newest-first.
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: Pending list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [players, count]
                        properties:
                          players:
                            type: array
                            items:
                              $ref: "#/components/schemas/PendingPlayer"
                          count:
                            type: integer
        "403":
          description: FORBIDDEN — caller lacks PLAYER_KYC_READ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/admin/players/rejected:
    get:
      tags: [Admin — Players]
      summary: List players whose KYC was rejected
      description: |
        **RBAC:** `PLAYER_KYC_READ`. Same shape as `/pending` but filtered on
        `kycStatus = REJECTED`. Useful for follow-up, resubmit-flow.
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: Rejected list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [players, count]
                        properties:
                          players:
                            type: array
                            items:
                              $ref: "#/components/schemas/RejectedPlayer"
                          count:
                            type: integer
        "403":
          description: FORBIDDEN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/admin/players/{id}:
    get:
      tags: [Admin — Players]
      summary: Get full detail (incl. complianceData) for a single player
      description: |
        **RBAC:** `PLAYER_KYC_READ`. Returns the same fields as the list
        endpoints plus the raw `complianceData` blob from the KYC provider.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Player detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PlayerDetail"
        "403":
          description: FORBIDDEN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: USER_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/admin/players/{id}/audit:
    get:
      tags: [Admin — Players]
      summary: List audit-log events for a single player
      description: |
        **RBAC:** `PLAYER_KYC_READ`. Returns the audit stream filtered to
        `resource=user`, `resourceId={id}`, newest-first. Includes KYC
        moderation actions (`player.kyc.approve|reject|resubmit|override`)
        plus profile-updates and GDPR-deletion.

        The endpoint first verifies the user exists before reading the
        audit store so a missing user returns `USER_NOT_FOUND` instead of
        leaking "no events" (which could be confused with an empty history).
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: Audit events
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [events, count]
                        properties:
                          events:
                            type: array
                            items:
                              $ref: "#/components/schemas/AuditLogEntry"
                          count:
                            type: integer
        "403":
          description: FORBIDDEN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: USER_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/admin/players/{id}/approve:
    post:
      tags: [Admin — Players]
      summary: Approve a player's KYC (transitions status to VERIFIED)
      description: |
        **RBAC:** `PLAYER_KYC_MODERATE` (ADMIN, HALL_OPERATOR, SUPPORT).

        Side effects:
        - Writes `player.kyc.approve` audit-log entry (fire-and-forget).
        - Sends `kyc-approved` template e-mail to the player (fire-and-forget;
          SMTP failures do NOT block the status change).
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KYCApprovalInput"
      responses:
        "200":
          description: Player approved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PlayerSummary"
        "403":
          description: FORBIDDEN — caller lacks PLAYER_KYC_MODERATE
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: USER_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: KYC_STATE_CONFLICT — brukeren er ikke i PENDING-state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/admin/players/{id}/reject:
    post:
      tags: [Admin — Players]
      summary: Reject a player's KYC with a required reason
      description: |
        **RBAC:** `PLAYER_KYC_MODERATE`. Transitions status to REJECTED.
        Reason is required (maks 500 tegn), persistert i audit-log og
        inkludert i rejection-e-post til spilleren. Spiller kan sende på
        nytt dersom admin senere kaller `/resubmit`.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KYCRejectionInput"
      responses:
        "200":
          description: Player rejected
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PlayerSummary"
        "400":
          description: INVALID_INPUT — reason mangler eller er for lang
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: FORBIDDEN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: USER_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: KYC_STATE_CONFLICT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/admin/players/{id}/resubmit:
    post:
      tags: [Admin — Players]
      summary: Reopen KYC so a rejected/verified player can submit fresh documents
      description: |
        **RBAC:** `PLAYER_KYC_MODERATE`. Transitions status to UNVERIFIED.
        Writes `player.kyc.resubmit` audit-log; ingen e-post sendes i
        denne versjonen — moderator informerer spilleren ut-av-bånd.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: KYC reopened
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PlayerSummary"
        "403":
          description: FORBIDDEN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: USER_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/admin/players/{id}/kyc-status:
    put:
      tags: [Admin — Players]
      summary: Admin-only override of a player's KYC status (bypasses normal moderator flow)
      description: |
        **RBAC:** `PLAYER_KYC_OVERRIDE` (ADMIN only). Brukes til manuell
        korreksjon: rulle tilbake en feil-godkjennelse, eller tvinge
        VERIFIED uten standard-flyt (f.eks. etter manuell dokumentsjekk).

        Audit-log-entry (`player.kyc.override`) får både ny status og
        reason — viktig fordi denne ruten bypasser approve/reject-guards.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KYCOverrideInput"
      responses:
        "200":
          description: Status overridden
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PlayerSummary"
        "400":
          description: INVALID_INPUT — status må være UNVERIFIED/PENDING/VERIFIED/REJECTED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: FORBIDDEN — caller lacks PLAYER_KYC_OVERRIDE (ADMIN only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: USER_NOT_FOUND
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ── BIN-583 B3.1: Agent-auth ────────────────────────────────────────────────

  /api/agent/auth/login:
    post:
      tags: [Agent — Auth]
      summary: Agent login
      description: Verifies credentials + role=AGENT + agent_status=active. Creates a session token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Login OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AgentSessionResponse"
        "400":
          description: INVALID_CREDENTIALS / FORBIDDEN / ACCOUNT_INACTIVE
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /api/agent/auth/logout:
    post:
      tags: [Agent — Auth]
      summary: Logout — revoke access token
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          loggedOut: { type: boolean, enum: [true] }

  /api/agent/auth/me:
    get:
      tags: [Agent — Auth]
      summary: Get own agent profile
      responses:
        "200":
          description: Agent profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AgentProfile" }
        "400":
          description: UNAUTHORIZED / FORBIDDEN / ACCOUNT_INACTIVE
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
    put:
      tags: [Agent — Auth]
      summary: Update own profile (self-service — displayName/email/phone only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName: { type: string }
                email: { type: string, format: email }
                phone: { type: [string, "null"] }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AgentProfile" }
        "400":
          description: FORBIDDEN (whitelisted fields only) / UNAUTHORIZED
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /api/agent/auth/change-password:
    post:
      tags: [Agent — Auth]
      summary: Change own password (requires old password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword: { type: string }
                newPassword: { type: string }
      responses:
        "200":
          description: Changed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          changed: { type: boolean, enum: [true] }
        "400":
          description: INVALID_CREDENTIALS (wrong oldPassword)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /api/agent/auth/change-avatar:
    post:
      tags: [Agent — Auth]
      summary: Set avatar filename reference
      description: |
        B3.1 sets only the filename reference. Actual file upload is handled
        via a separate admin flow (SFTP/S3). Filename must match `^[\w.-]{1,128}$`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [avatarFilename]
              properties:
                avatarFilename: { type: string }
      responses:
        "200":
          description: Avatar set
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AgentProfile" }
        "400":
          description: INVALID_AVATAR_FILENAME
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /api/agent/auth/update-language:
    post:
      tags: [Agent — Auth]
      summary: Set UI language (whitelisted — nb/nn/en/sv/da)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [language]
              properties:
                language: { type: string, enum: [nb, nn, en, sv, da] }
      responses:
        "200":
          description: Language updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AgentProfile" }
        "400":
          description: INVALID_LANGUAGE
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  # ── BIN-583 B3.1: Agent-shift ───────────────────────────────────────────────

  /api/agent/shift/start:
    post:
      tags: [Agent — Shift]
      summary: Open a new shift in the given hall
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hallId]
              properties:
                hallId: { type: string }
      responses:
        "200":
          description: Shift opened
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AgentShift" }
        "400":
          description: HALL_NOT_ASSIGNED / SHIFT_ALREADY_ACTIVE / ACCOUNT_INACTIVE
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /api/agent/shift/end:
    post:
      tags: [Agent — Shift]
      summary: Close the agent's active shift
      responses:
        "200":
          description: Shift ended
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AgentShift" }
        "400":
          description: NO_ACTIVE_SHIFT / SHIFT_ALREADY_ENDED
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /api/agent/shift/current:
    get:
      tags: [Agent — Shift]
      summary: Get active shift (null if none)
      responses:
        "200":
          description: Current shift or null
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          shift:
                            oneOf:
                              - $ref: "#/components/schemas/AgentShift"
                              - type: "null"

  /api/agent/shift/history:
    get:
      tags: [Agent — Shift]
      summary: Paginated shift history for the caller
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50, minimum: 1, maximum: 500 }
        - in: query
          name: offset
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        "200":
          description: Paginated list of shifts (DESC on startedAt)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          shifts:
                            type: array
                            items: { $ref: "#/components/schemas/AgentShift" }
                          limit: { type: integer }
                          offset: { type: integer }

  # ── BIN-583 B3.1: Admin-agents ──────────────────────────────────────────────

  /api/admin/agents:
    get:
      tags: [Admin — Agents]
      summary: List agents (AGENT_READ — ADMIN/HALL_OPERATOR/SUPPORT)
      description: HALL_OPERATOR is automatically scoped to own hall.
      parameters:
        - in: query
          name: hallId
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, enum: [active, inactive] }
        - in: query
          name: limit
          schema: { type: integer, default: 100 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Paginated agent list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          agents:
                            type: array
                            items: { $ref: "#/components/schemas/AgentProfile" }
                          limit: { type: integer }
                          offset: { type: integer }
        "400":
          description: FORBIDDEN
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
    post:
      tags: [Admin — Agents]
      summary: Create an agent (AGENT_WRITE — ADMIN/HALL_OPERATOR)
      description: HALL_OPERATOR may only assign their own hall.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, displayName, surname]
              properties:
                email: { type: string, format: email }
                password: { type: string }
                displayName: { type: string }
                surname: { type: string }
                phone: { type: string }
                language: { type: string, enum: [nb, nn, en, sv, da] }
                parentUserId: { type: [string, "null"] }
                hallIds:
                  type: array
                  items: { type: string }
                primaryHallId: { type: string }
      responses:
        "200":
          description: Agent created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AgentProfile" }
        "400":
          description: EMAIL_EXISTS / INVALID_PRIMARY_HALL / FORBIDDEN / INVALID_LANGUAGE
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /api/admin/agents/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      tags: [Admin — Agents]
      summary: Get a single agent
      responses:
        "200":
          description: Agent found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AgentProfile" }
        "400":
          description: AGENT_NOT_FOUND / FORBIDDEN
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
    put:
      tags: [Admin — Agents]
      summary: Update agent (AGENT_WRITE)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName: { type: string }
                email: { type: string, format: email }
                phone: { type: [string, "null"] }
                language: { type: string, enum: [nb, nn, en, sv, da] }
                avatarFilename: { type: [string, "null"] }
                agentStatus: { type: string, enum: [active, inactive] }
                parentUserId: { type: [string, "null"] }
                hallIds:
                  type: array
                  items: { type: string }
                primaryHallId: { type: string }
      responses:
        "200":
          description: Agent updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AgentProfile" }
        "400":
          description: FORBIDDEN / INVALID_PRIMARY_HALL / AGENT_NOT_FOUND
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
    delete:
      tags: [Admin — Agents]
      summary: Soft-delete agent (AGENT_DELETE — ADMIN only)
      description: Blocks delete if agent has an active shift.
      responses:
        "200":
          description: Soft-deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          deleted: { type: boolean, enum: [true] }
        "400":
          description: AGENT_HAS_ACTIVE_SHIFT / AGENT_NOT_FOUND / FORBIDDEN
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  # ── BIN-583 B3.2: Agent-transactions ────────────────────────────────────────

  /api/agent/players/lookup:
    post:
      tags: [Agent — Transactions]
      summary: Search players in the agent's active-shift hall (prefix-match)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: { type: string, minLength: 2 }
      responses:
        "200":
          description: Matching players (max 20)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          players:
                            type: array
                            items: { $ref: "#/components/schemas/PlayerLookupResult" }
        "400":
          description: INVALID_INPUT / FORBIDDEN / NO_ACTIVE_SHIFT
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /api/agent/players/{id}/balance:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      tags: [Agent — Transactions]
      summary: Read a player's wallet balance (requires PLAYER_NOT_AT_HALL-check)
      responses:
        "200":
          description: Balance snapshot
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/PlayerBalanceSnapshot" }
        "400":
          description: PLAYER_NOT_AT_HALL / NO_ACTIVE_SHIFT / USER_NOT_FOUND
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /api/agent/players/{id}/cash-in:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      tags: [Agent — Transactions]
      summary: Credit player wallet (CASH increments shift.daily_balance, CARD doesn't)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, paymentMethod, clientRequestId]
