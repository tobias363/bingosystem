      summary: Get the authenticated player's gambling activity report
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [today, last7, last30, last365, custom]
            default: last7
        - in: query
          name: hallId
          schema:
            type: string
      responses:
        "200":
          description: Player activity report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

