openapi: "3.1.0"
info:
  title: Spillorama Bingo API
  version: "0.1.0"
  description: |
    Backend API for the Spillorama bingo platform.

    **Authentication**: All player and admin endpoints (except `/api/auth/login`,
    `/api/auth/register`, and Swedbank webhooks) require a Bearer token in the
    `Authorization` header obtained from the login or register endpoints.

    **Error shape**: All errors return `{ ok: false, error: { code, message } }`.
    Success responses return `{ ok: true, data: <payload> }`.

servers:
  - url: http://localhost:4000
    description: Local development
  - url: https://api.spillorama.no
    description: Production

tags:
  - name: Auth
    description: Authentication, profile management, and session handling
  - name: KYC
    description: Identity verification (BankID and manual)
  - name: Games
    description: Available games, halls, rooms, and leaderboard
  - name: Wallet
    description: Player wallet, top-ups, and transfers
  - name: Spillevett
    description: Responsible gaming — reports, loss limits, pauses, self-exclusion
  - name: CMS — Public
    description: |
      Public (un-authenticated) read-endpoints for static content (FAQ, Terms,
      About Us, Responsible Gaming, Support, Links). Player-app uses these to
      show static pages BEFORE login. GAP #22 + #33 — see
      docs/architecture/BACKEND_1TO1_GAP_AUDIT_2026-04-24.md.
  - name: Payments
    description: Swedbank Pay payment intents and callbacks
  - name: Admin — Auth
    description: Admin login, bootstrap, RBAC
  - name: Admin — Games
    description: Game settings, rooms, draw control
  - name: Admin — Halls
    description: Hall and terminal management, spilleplan
  - name: Admin — Compliance
    description: Player compliance, prize policy, payout audit
  - name: Admin — Ledger
    description: Compliance ledger entries and daily reports
  - name: Admin — Overskudd
    description: Surplus distribution to organisations (pengespillforskriften)
  - name: Payment Requests
    description: Manual cash/bank deposit + withdraw queue (player-side endpoints). BIN-586.
  - name: Admin — Payment Requests
    description: Hall-operator accept/reject for the manual deposit/withdraw queue. BIN-586.
  - name: Players
    description: Player-resource endpoints — profile, GDPR self-service account deletion. BIN-587 B2.1.
  - name: Admin — Users
    description: User-role and hall-assignment management. BIN-591.
  - name: Admin — Players
    description: Player KYC-moderation — list pending/rejected, approve, reject, resubmit, override. BIN-587 B2.2.
  - name: Agent — Auth
    description: Agent-side auth (login/logout/profile/password/avatar/language). BIN-583 B3.1.
  - name: Agent — Shift
    description: Agent shift lifecycle (start/end/current/history). BIN-583 B3.1.
  - name: Admin — Agents
    description: Admin CRUD for agent users (list/create/read/update/soft-delete). BIN-583 B3.1.
  - name: Agent — Transactions
    description: Agent cash-ops (cash-in/out), player lookup + balance, digital/physical ticket sale + cancel, transaction log. BIN-583 B3.2.
  - name: Agent — Settlement
    description: Daglig kasse-oppgjør — control-daily-balance, close-day, PDF-eksport, admin edit. BIN-583 B3.3.
  - name: Agent — Metronia
    description: Metronia ekstern-maskin-integrasjon — ticket create/topup/payout/void + rapporter. BIN-583 B3.4.
  - name: Agent — OK Bingo
    description: OK Bingo ekstern-maskin-integrasjon (SQL Server polling) — ticket create/topup/payout/void + open-day + rapporter. BIN-583 B3.5.
  - name: Security
    description: |
      Browser-emitted security telemetry (CSP-violation reports, etc.). These
      endpoints are unauthenticated by design — browsers send them as a side-
      effect of policy violations. BIN-776.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  schemas:
    ApiSuccess:
      type: object
      required: [ok, data]
      properties:
        ok:
          type: boolean
          enum: [true]
        data:
          description: Endpoint-specific payload

    ApiError:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: INVALID_INPUT
            message:
              type: string
              example: E-post er påkrevd.

    Session:
      type: object
      properties:
        accessToken:
          type: string
        userId:
          type: string
        email:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [player, operator, support, admin]
        walletId:
          type: string

    AppUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        displayName:
          type: string
        surname:
          type: string
        phone:
          type: [string, "null"]
        birthDate:
          type: [string, "null"]
          format: date
        role:
          type: string
        walletId:
          type: string
        kycStatus:
          type: string
          enum: [PENDING, VERIFIED, REJECTED]
        kycVerifiedAt:
          type: [string, "null"]
          format: date-time

    WalletAccount:
      type: object
      properties:
        id:
          type: string
        balance:
          type: number
        currency:
          type: string
          example: NOK
        createdAt:
          type: string
          format: date-time

    WalletTransaction:
      type: object
      properties:
        id:
          type: string
        walletId:
          type: string
        type:
          type: string
          enum: [TOPUP, WITHDRAWAL, STAKE, PRIZE, REFUND, TRANSFER_IN, TRANSFER_OUT]
        amount:
          type: number
        reason:
          type: string
        createdAt:
          type: string
          format: date-time

    PlayerCompliance:
      type: object
      properties:
        walletId:
          type: string
        canPlay:
          type: boolean
        selfExcluded:
          type: boolean
        timedPauseUntil:
          type: [string, "null"]
          format: date-time
        dailyLossLimit:
          type: [number, "null"]
        monthlyLossLimit:
          type: [number, "null"]

    AppGame:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        isEnabled:
          type: boolean

    Hall:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        orgNumber:
          type: string
        settlementAccount:
          type: string
        isActive:
          type: boolean

    RoomSummary:
      type: object
      properties:
        code:
          type: string
        gameSlug:
          type: string
        gameStatus:
          type: string
          enum: [NONE, WAITING, RUNNING, ENDED]
        status:
          type: string
          enum: [OPEN, PLAYING, WAITING, ENDED]
        hallId:
          type: [string, "null"]
        nextRoundAt:
          type: [string, "null"]
          format: date-time

    ScheduleSlot:
      type: object
      properties:
        id:
          type: string
        hallId:
          type: string
        gameSlug:
          type: string
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
          description: "0=Sunday, 1=Monday, …, 6=Saturday"
        startTime:
          type: string
          example: "19:00"
        isActive:
          type: boolean

    SwedbankIntent:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        walletId:
          type: string
        amountMajor:
          type: number
        status:
          type: string
          enum: [PENDING, PAID, FAILED, CANCELLED]
        paymentUrl:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time

    LeaderboardEntry:
      type: object
      properties:
        nickname:
          type: string
        displayName:
          type: string
        points:
          type: number

    # ── Payment requests (BIN-586) ────────────────────────────────────────

    PaymentRequestKind:
      type: string
      enum: [deposit, withdraw]
      description: Whether the queued request is an incoming (deposit) or outgoing (withdraw) wallet move.

    PaymentRequestStatus:
      type: string
      enum: [PENDING, ACCEPTED, REJECTED]

    PaymentRequest:
      type: object
      required:
        [id, kind, userId, walletId, amountCents, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        kind:
          $ref: "#/components/schemas/PaymentRequestKind"
        userId:
          type: string
        walletId:
          type: string
        amountCents:
          type: integer
          minimum: 1
          description: Amount in minor units (øre). `10000` = 100 NOK.
        hallId:
          type: [string, "null"]
          description: Hall where the request was submitted. HALL_OPERATOR is scoped to their own hall (BIN-591).
        submittedBy:
          type: [string, "null"]
          description: User ID of the actor who submitted the request (terminal staff or the player themselves).
        status:
          $ref: "#/components/schemas/PaymentRequestStatus"
        rejectionReason:
          type: [string, "null"]
        acceptedBy:
          type: [string, "null"]
        acceptedAt:
          type: [string, "null"]
          format: date-time
        rejectedBy:
          type: [string, "null"]
        rejectedAt:
          type: [string, "null"]
          format: date-time
        walletTransactionId:
          type: [string, "null"]
          description: |
            Set once the request is ACCEPTED. Links to the ledger entry that
            credited (deposit) or debited (withdraw) the player's wallet.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DepositRequestInput:
      type: object
      required: [amountCents]
      properties:
        amountCents:
          type: integer
          minimum: 1
        hallId:
          type: string
          description: Optional. Required in practice when HALL_OPERATOR submits on behalf of a player.

    WithdrawRequestInput:
      allOf:
        - $ref: "#/components/schemas/DepositRequestInput"
      description: Same shape as deposit; amount is still positive, direction determined by endpoint.

    AcceptPaymentRequestInput:
      type: object
      required: [type]
      properties:
        type:
          $ref: "#/components/schemas/PaymentRequestKind"

    RejectPaymentRequestInput:
      type: object
      required: [type, reason]
      properties:
        type:
          $ref: "#/components/schemas/PaymentRequestKind"
        reason:
          type: string
          minLength: 1
          description: Human-readable rejection reason stored on the row for audit.

    # ── Auth (BIN-587 B2.1 — password reset, email verify) ────────────────

    PasswordResetTokenValid:
      type: object
      description: Returned by GET /api/auth/reset-password/{token} when the token is valid.
      required: [valid, userId]
      properties:
        valid:
          type: boolean
          enum: [true]
        userId:
          type: string

    ResetPasswordInput:
      type: object
      required: [newPassword]
      properties:
        newPassword:
          type: string
          minLength: 12

    # ── Players (BIN-587 B2.1) ────────────────────────────────────────────

    PlayerProfile:
      type: object
      required: [id, email, displayName, hallId, kycStatus, createdAt, updatedAt]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        surname:
          type: [string, "null"]
        phone:
          type: [string, "null"]
        hallId:
          type: string
          description: Primary hall association.
        kycStatus:
          type: string
          enum: [PENDING, VERIFIED, REJECTED]
        birthDate:
          type: [string, "null"]
          format: date
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PlayerProfileUpdateInput:
      type: object
      description: All fields optional — only the supplied fields are updated.
      properties:
        displayName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string

    # ── Admin — Users (BIN-591) ───────────────────────────────────────────

    AdminUserHallAssignmentInput:
      type: object
      required: [hallId]
      properties:
        hallId:
          type: [string, "null"]
          description: |
            Target hall-id for HALL_OPERATOR scoping. Pass `null` (or empty string)
            to clear the assignment. Only meaningful for HALL_OPERATOR — other
            roles ignore the field.

    # ── Admin — Players / KYC-moderation (BIN-587 B2.2) ───────────────────

    KycStatus:
      type: string
      enum: [UNVERIFIED, PENDING, VERIFIED, REJECTED]
      description: |
        Player KYC lifecycle. `UNVERIFIED` = aldri innsendt, `PENDING` = awaiting
        moderator, `VERIFIED` = godkjent, `REJECTED` = avvist (spiller kan sende
        på nytt hvis admin kaller `/resubmit`).

    PlayerSummary:
      type: object
      description: |
        Moderator-view of a player. Strips wallet/session-detaljer — bruk
        `/api/admin/wallets/...` for compliance-visning.
      required: [id, email, displayName, kycStatus, hallId, createdAt, updatedAt]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        surname:
          type: [string, "null"]
        phone:
          type: [string, "null"]
        kycStatus:
          $ref: "#/components/schemas/KycStatus"
        birthDate:
          type: [string, "null"]
          format: date
        kycVerifiedAt:
          type: [string, "null"]
          format: date-time
        kycProviderRef:
          type: [string, "null"]
          description: Provider-side referanse (BankID-sesjons-id el.l.) hvis tilgjengelig.
        hallId:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        complianceData:
          type: [object, "null"]
          additionalProperties: true
          description: Fri-formet metadata fra KYC-provider — rå payload for audit.

    PlayerDetail:
      allOf:
        - $ref: "#/components/schemas/PlayerSummary"
      description: Detail-response har for øyeblikket samme shape som summary; felt-sett kan utvides uten å bryte client-kontrakt.

    # Alias-navn for briefens terminologi — peker begge på PlayerSummary
    # siden list-endpoints bare differensierer via `kycStatus`-verdien.
    PendingPlayer:
      allOf:
        - $ref: "#/components/schemas/PlayerSummary"
      description: PlayerSummary der `kycStatus=PENDING`.

    RejectedPlayer:
      allOf:
        - $ref: "#/components/schemas/PlayerSummary"
      description: PlayerSummary der `kycStatus=REJECTED`.

    KYCApprovalInput:
      type: object
      description: Body for approve. Note-feltet er valgfritt og trimmes til maks 500 tegn før audit-log.
      properties:
        note:
          type: string
          maxLength: 500

    KYCRejectionInput:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 500
          description: Påkrevd. Persistert i audit-log og sendt til spilleren i rejection-e-post.

    KYCOverrideInput:
      type: object
      required: [status, reason]
      description: Admin-only override (PLAYER_KYC_OVERRIDE). Bypasser normal moderator-flyt; krever at `reason` dokumenterer hvorfor.
      properties:
        status:
          $ref: "#/components/schemas/KycStatus"
        reason:
          type: string
          minLength: 1
          maxLength: 500

    AuditActorType:
      type: string
      enum: [USER, ADMIN, HALL_OPERATOR, SUPPORT, PLAYER, SYSTEM]

    AuditLogEntry:
      type: object
      description: |
        Persistert audit-hendelse. Returneres av
        `GET /api/admin/players/{id}/audit` filtrert på `resource=user`.
      required: [id, actorType, action, resource, createdAt]
      properties:
        id:
          type: string
        actorId:
          type: [string, "null"]
        actorType:
          $ref: "#/components/schemas/AuditActorType"
        action:
          type: string
          description: Stable dotted verb, f.eks. `player.kyc.approve`, `player.kyc.reject`, `player.kyc.override`.
        resource:
          type: string
          description: Entity kind, f.eks. `user`.
        resourceId:
          type: [string, "null"]
        details:
          type: object
          additionalProperties: true
          description: Action-spesifikke felt (f.eks. `reason`, `newStatus`, `note`).
        ipAddress:
          type: [string, "null"]
        userAgent:
          type: [string, "null"]
        createdAt:
          type: string
          format: date-time

    # ── BIN-583 B3.1: agent-domene ───────────────────────────────────────────
    AgentHallAssignment:
      type: object
      required: [userId, hallId, isPrimary, assignedAt]
      properties:
        userId: { type: string }
        hallId: { type: string }
        isPrimary: { type: boolean }
        assignedAt: { type: string, format: date-time }
        assignedByUserId: { type: [string, "null"] }

    AgentProfile:
      type: object
      required: [userId, email, displayName, role, agentStatus, language, halls, createdAt, updatedAt]
      properties:
        userId: { type: string }
        email: { type: string, format: email }
        displayName: { type: string }
        surname: { type: [string, "null"] }
        phone: { type: [string, "null"] }
        role:
          type: string
          enum: [AGENT]
        agentStatus:
          type: string
          enum: [active, inactive]
        language:
          type: string
          description: ISO-639-1 (nb/nn/en/sv/da). Default nb.
        avatarFilename: { type: [string, "null"] }
        parentUserId: { type: [string, "null"] }
        halls:
          type: array
          items: { $ref: "#/components/schemas/AgentHallAssignment" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AgentShift:
      type: object
      required: [id, userId, hallId, startedAt, isActive, isLoggedOut]
      properties:
        id: { type: string }
        userId: { type: string }
        hallId: { type: string }
        startedAt: { type: string, format: date-time }
        endedAt: { type: [string, "null"], format: date-time }
        isActive: { type: boolean }
        isLoggedOut: { type: boolean }
        isDailyBalanceTransferred: { type: boolean }
        dailyBalance: { type: number }
        totalCashIn: { type: number }
        totalCashOut: { type: number }
        totalCardIn: { type: number }
        totalCardOut: { type: number }
        hallCashBalance: { type: number }
        hallDropsafeBalance: { type: number }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AgentSessionResponse:
      type: object
      required: [accessToken, expiresAt, user, agent]
      properties:
        accessToken: { type: string }
        expiresAt: { type: string, format: date-time }
        user: { $ref: "#/components/schemas/AppUser" }
        agent: { $ref: "#/components/schemas/AgentProfile" }

    # ── BIN-583 B3.2: agent-transaksjon-skjema ───────────────────────────────
    AgentTransaction:
      type: object
      required: [id, shiftId, agentUserId, playerUserId, hallId, actionType,
                 walletDirection, paymentMethod, amount, previousBalance,
                 afterBalance, createdAt]
      properties:
        id: { type: string }
        shiftId: { type: string }
        agentUserId: { type: string }
        playerUserId: { type: string }
        hallId: { type: string }
        actionType:
          type: string
          enum: [CASH_IN, CASH_OUT, TICKET_SALE, TICKET_REGISTER, TICKET_CANCEL, FEE, OTHER]
        walletDirection:
          type: string
          enum: [CREDIT, DEBIT]
        paymentMethod:
          type: string
          enum: [CASH, CARD, WALLET]
        amount: { type: number }
        previousBalance: { type: number }
        afterBalance: { type: number }
        walletTxId: { type: [string, "null"] }
        ticketUniqueId: { type: [string, "null"] }
        externalReference: { type: [string, "null"] }
        notes: { type: [string, "null"] }
        otherData: { type: object, additionalProperties: true }
        relatedTxId: { type: [string, "null"] }
        createdAt: { type: string, format: date-time }

    PhysicalTicketInventory:
      type: object
      required: [uniqueId, batchId, hallId, status, priceCents]
      properties:
        uniqueId: { type: string }
        batchId: { type: string }
        hallId: { type: string }
        status:
          type: string
          enum: [UNSOLD, SOLD, VOIDED]
        priceCents: { type: integer }
        assignedGameId: { type: [string, "null"] }

    PlayerLookupResult:
      type: object
      required: [id, email, displayName]
      properties:
        id: { type: string }
        email: { type: string, format: email }
        displayName: { type: string }
        phone: { type: [string, "null"] }

    PlayerBalanceSnapshot:
      type: object
      required: [playerUserId, walletBalance, displayName, email]
      properties:
        playerUserId: { type: string }
        walletBalance: { type: number }
        displayName: { type: string }
        email: { type: string, format: email }

    # ── BIN-583 B3.3: settlement-skjema ──────────────────────────────────────
    AgentSettlement:
      type: object
      required: [id, shiftId, agentUserId, hallId, businessDate,
                 dailyBalanceAtEnd, reportedCashCount, dailyBalanceDifference,
                 closedByUserId, isForced, createdAt, updatedAt]
      properties:
        id: { type: string }
        shiftId: { type: string }
        agentUserId: { type: string }
        hallId: { type: string }
        businessDate: { type: string, format: date }
        dailyBalanceAtStart: { type: number }
        dailyBalanceAtEnd: { type: number }
        reportedCashCount: { type: number }
        dailyBalanceDifference: { type: number }
        settlementToDropSafe: { type: number }
        withdrawFromTotalBalance: { type: number }
        totalDropSafe: { type: number }
        shiftCashInTotal: { type: number }
        shiftCashOutTotal: { type: number }
        shiftCardInTotal: { type: number }
        shiftCardOutTotal: { type: number }
        settlementNote: { type: [string, "null"] }
        closedByUserId: { type: string }
        isForced: { type: boolean }
        editedByUserId: { type: [string, "null"] }
        editedAt: { type: [string, "null"], format: date-time }
        editReason: { type: [string, "null"] }
        otherData: { type: object, additionalProperties: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ControlDailyBalanceResult:
      type: object
      required: [shiftDailyBalance, reportedDailyBalance, diff, diffPct, severity]
      properties:
        shiftDailyBalance: { type: number }
        reportedDailyBalance: { type: number }
        diff: { type: number }
        diffPct: { type: number }
        severity:
          type: string
          enum: [OK, NOTE_REQUIRED, FORCE_REQUIRED]

    SettlementDateInfo:
      type: object
      required: [expectedBusinessDate, hasPendingPreviousDay]
      properties:
        expectedBusinessDate: { type: string, format: date }
        hasPendingPreviousDay: { type: boolean }
        pendingShiftId: { type: [string, "null"] }

    # ── BIN-583 B3.4: machine-ticket-skjema ──────────────────────────────────
    MachineTicket:
      type: object
      required: [id, machineName, ticketNumber, externalTicketId, hallId,
                 agentUserId, playerUserId, initialAmountCents,
                 currentBalanceCents, isClosed, uniqueTransaction,
                 createdAt, updatedAt]
      properties:
        id: { type: string }
        machineName:
          type: string
          enum: [METRONIA, OK_BINGO]
        ticketNumber: { type: string }
        externalTicketId: { type: string }
        hallId: { type: string }
        shiftId: { type: [string, "null"] }
        agentUserId: { type: string }
        playerUserId: { type: string }
        roomId: { type: [string, "null"] }
        initialAmountCents: { type: integer }
        totalTopupCents: { type: integer }
        currentBalanceCents: { type: integer }
        payoutCents: { type: [integer, "null"] }
        isClosed: { type: boolean }
        closedAt: { type: [string, "null"], format: date-time }
        closedByUserId: { type: [string, "null"] }
        voidAt: { type: [string, "null"], format: date-time }
        voidByUserId: { type: [string, "null"] }
        voidReason: { type: [string, "null"] }
        uniqueTransaction: { type: string }
        otherData: { type: object, additionalProperties: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    MetroniaSalesAggregate:
      type: object
      required: [totalCreatedNok, totalToppedUpNok, totalPaidOutNok, ticketCount, voidCount]
      properties:
        shiftId: { type: [string, "null"] }
        hallId: { type: string }
        totalCreatedNok: { type: number }
        totalToppedUpNok: { type: number }
        totalPaidOutNok: { type: number }
        ticketCount: { type: integer }
        voidCount: { type: integer }

    # ── CMS — Public (GAP #22 + #33) ──────────────────────────────────────
    PublicCmsContent:
      type: object
      description: |
        Published CMS content for public consumption. Stripped down vs.
        admin-view: no `updatedByUserId`, no `createdAt` — only the live
        content + `publishedAt`.
      required: [slug, content, publishedAt]
      properties:
        slug:
          type: string
          enum: [aboutus, terms, support, links, responsible-gaming]
          description: Canonical slug (after alias resolution).
        content:
          type: string
          description: Published content (HTML or plain-text).
        publishedAt:
          type: string
          format: date-time
          description: |
            For regulatoriske slugs: live-versjonens `publishedAt`. For
            ikke-regulatoriske: `app_cms_content.updatedAt`.

security:
  - BearerAuth: []

paths:

  # ── Auth ──────────────────────────────────────────────────────────────────

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new player account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, displayName, surname, birthDate]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 12
                  description: Min 12 chars, must include uppercase, lowercase, and digit
                displayName:
                  type: string
                surname:
                  type: string
                birthDate:
                  type: string
                  format: date
                phone:
                  type: string
                complianceData:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Account created — returns session token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Session"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Session token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Session"
        "401":
          description: Wrong credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/login-phone:
    post:
      tags: [Auth]
      summary: Log in with Norwegian phone number + PIN (REQ-130 / PDF 9 Frontend CR)
      description: |
        Alternativ til /api/auth/login som tar `{ phone, pin }`. `phone`
        normaliseres til kanonisk +47XXXXXXXX-form. `pin` er 4-6 siffer.

        Brukeren må ha satt opp PIN via /api/auth/pin/setup. Etter 5 feilede
        forsøk låses PIN-en (PIN_LOCKED) og krever admin-reset.

        Enumeration-safe: ukjent telefon og feil PIN gir samme feilmelding.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, pin]
              properties:
                phone:
                  type: string
                  description: Norsk telefonnummer (+47XXXXXXXX, eller 8-sifret nasjonalt)
                pin:
                  type: string
                  pattern: "^\\d{4,6}$"
      responses:
        "200":
          description: Session token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Session"
        "400":
          description: INVALID_PHONE / INVALID_PIN / INVALID_CREDENTIALS / PIN_LOCKED / PIN_NOT_CONFIGURED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/pin/setup:
    post:
      tags: [Auth]
      summary: Aktiver eller oppdater 4-6-sifret PIN for innlogging (REQ-130)
      description: |
        Krever auth. Idempotent — setter ny PIN over evt. eksisterende og
        nullstiller failed_attempts/locked_until.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pin]
              properties:
                pin:
                  type: string
                  pattern: "^\\d{4,6}$"
      responses:
        "200":
          description: PIN aktivert
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          enabled:
                            type: boolean
                            enum: [true]
        "400":
          description: INVALID_PIN / PIN_NOT_CONFIGURED / UNAUTHORIZED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/pin/disable:
    post:
      tags: [Auth]
      summary: Deaktiver PIN — krever passord-bekreftelse (REQ-130)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        "200":
          description: PIN slettet
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          disabled:
                            type: boolean
                            enum: [true]
        "400":
          description: INVALID_CREDENTIALS / PIN_NOT_CONFIGURED / UNAUTHORIZED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/auth/pin/status:
    get:
      tags: [Auth]
      summary: Hent PIN-status for innlogget bruker (REQ-130)
      responses:
        "200":
          description: PIN-status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          enabled:
                            type: boolean
                          locked:
                            type: boolean
                          lockedUntil:
                            type: [string, "null"]
                            format: date-time
                          failedAttempts:
                            type: integer
                          lastUsedAt:
                            type: [string, "null"]
                            format: date-time
                          configured:
                            type: boolean
                            description: Om PIN-tjenesten er konfigurert på serveren

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current session token
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          loggedOut:
                            type: boolean

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Issue a new token, invalidate the current one
      responses:
        "200":
          description: New session
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Session"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get the authenticated user's profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AppUser"
    put:
      tags: [Auth]
      summary: Update display name, email, or phone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AppUser"
    delete:
      tags: [Auth]
      summary: Delete the authenticated player's account
      responses:
        "200":
          description: Account deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          deleted:
                            type: boolean

  /api/auth/change-password:
    post:
      tags: [Auth]
      summary: Change password (requires current password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 12
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          changed:
                            type: boolean

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email (always returns success to prevent user enumeration)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Always succeeds
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          sent:
                            type: boolean

  # ── KYC ──────────────────────────────────────────────────────────────────

  /api/kyc/me:
    get:
      tags: [KYC]
      summary: Get the authenticated player's KYC status
      responses:
        "200":
          description: KYC status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          userId:
                            type: string
                          status:
                            type: string
                            enum: [PENDING, VERIFIED, REJECTED]
                          birthDate:
                            type: [string, "null"]
                            format: date
                          verifiedAt:
                            type: [string, "null"]
                            format: date-time
                          providerReference:
                            type: [string, "null"]

  /api/kyc/verify:
    post:
      tags: [KYC]
      summary: Submit manual KYC verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [birthDate]
              properties:
                birthDate:
                  type: string
                  format: date
                nationalId:
                  type: string
                  description: Norwegian national identity number (personnummer) — redacted in logs
      responses:
        "200":
          description: Verification submitted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/AppUser"

  /api/auth/bankid/init:
    post:
      tags: [KYC]
      summary: Start a BankID verification session
      responses:
        "200":
          description: BankID session created (or NOT_CONFIGURED if BankID is not wired up)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          sessionId:
                            type: string
                          authUrl:
                            type: [string, "null"]
                          status:
                            type: string
                            enum: [PENDING, NOT_CONFIGURED]

  /api/auth/bankid/status/{sessionId}:
    get:
      tags: [KYC]
      summary: Poll BankID verification status
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          sessionId:
                            type: string
                          status:
                            type: string
                            enum: [COMPLETE, PENDING, NOT_CONFIGURED]
                          verified:
                            type: boolean

  # ── Games & Rooms ─────────────────────────────────────────────────────────

  /api/games:
    get:
      tags: [Games]
      summary: List all enabled games
      responses:
        "200":
          description: Game list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AppGame"

  /api/games/status:
    get:
      tags: [Games]
      summary: Live status per game slug — used by lobby for Open/Starting/Closed badges
      responses:
        "200":
          description: Map of slug → status entry
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        additionalProperties:
                          type: object
                          properties:
                            status:
                              type: string
                              enum: [OPEN, STARTING, CLOSED]
                            nextRoundAt:
                              type: [string, "null"]
                              format: date-time

  /api/games/{slug}/launch:
    post:
      tags: [Games]
      summary: Launch an external game (e.g. Candy) — returns an embed URL
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                hallId:
                  type: string
                returnUrl:
                  type: string
                  format: uri
      responses:
        "200":
          description: Embed URL
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          embedUrl:
                            type: string
                          expiresAt:
                            type: [string, "null"]
                            format: date-time

  /api/halls:
    get:
      tags: [Games]
      summary: List active bingo halls
      responses:
        "200":
          description: Hall list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Hall"

  /api/halls/{hallId}/schedule:
    get:
      tags: [Games]
      summary: Today's game schedule for a hall (§ 64 spilleplan)
      parameters:
        - in: path
          name: hallId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Today's schedule slots
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ScheduleSlot"

  /api/rooms:
    get:
      tags: [Games]
      summary: List active rooms (optionally filtered by hallId)
      security: []
      parameters:
        - in: query
          name: hallId
          schema:
            type: string
      responses:
        "200":
          description: Room list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/RoomSummary"

  /api/rooms/{roomCode}:
    get:
      tags: [Games]
      summary: Get full room snapshot
      parameters:
        - in: path
          name: roomCode
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Room snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

  /api/rooms/{roomCode}/game/end:
    post:
      tags: [Games]
      summary: End the current game round in a room
      parameters:
        - in: path
          name: roomCode
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actorPlayerId]
              properties:
                actorPlayerId:
                  type: string
                reason:
                  type: string
      responses:
        "200":
          description: Updated room snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

  /api/rooms/{roomCode}/game/extra-draw:
    post:
      tags: [Games]
      summary: Reject an extra-draw purchase request for a player
      parameters:
        - in: path
          name: roomCode
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actorPlayerId]
              properties:
                actorPlayerId:
                  type: string
                requestedCount:
                  type: integer
                packageId:
                  type: string
      responses:
        "200":
          description: Rejection recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

  /api/leaderboard:
    get:
      tags: [Games]
      summary: Prize leaderboard (top 50)
      parameters:
        - in: query
          name: period
          schema:
            type: string
            enum: [today, week, month]
            default: week
        - in: query
          name: hallId
          schema:
            type: string
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/LeaderboardEntry"

  /api/notifications:
    get:
      tags: [Games]
      summary: List player notifications (stub — returns empty array in V1)
      responses:
        "200":
          description: Notification list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

  /api/notifications/read:
    post:
      tags: [Games]
      summary: Mark notifications as read
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

  # ── Wallet ────────────────────────────────────────────────────────────────

  /api/wallet/me:
    get:
      tags: [Wallet]
      summary: Get authenticated player's wallet account and last 20 transactions
      responses:
        "200":
          description: Wallet data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          account:
                            $ref: "#/components/schemas/WalletAccount"
                          transactions:
                            type: array
                            items:
                              $ref: "#/components/schemas/WalletTransaction"

  /api/wallet/me/transactions:
    get:
      tags: [Wallet]
      summary: Get player transaction history
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 500
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/WalletTransaction"

  /api/wallet/me/compliance:
    get:
      tags: [Wallet]
      summary: Get player compliance status (can play, limits, exclusions)
      parameters:
        - in: query
          name: hallId
          schema:
            type: string
      responses:
        "200":
          description: Compliance status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PlayerCompliance"

  /api/wallet/me/topup:
    post:
      tags: [Wallet]
      summary: Top up the authenticated player's wallet (manual or simulated)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: number
                  minimum: 0.01
                provider:
                  type: string
                  enum: [manual, swedbank_simulated]
                  default: manual
      responses:
        "200":
          description: Transaction record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

  /api/wallets:
    get:
      tags: [Wallet]
      summary: List all wallet accounts (admin use)
      responses:
        "200":
          description: Account list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/WalletAccount"
    post:
      tags: [Wallet]
      summary: Create a wallet account
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                walletId:
                  type: string
                initialBalance:
                  type: number
                  default: 1000
      responses:
        "200":
          description: Created account
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WalletAccount"

  /api/wallets/{walletId}:
    get:
      tags: [Wallet]
      summary: Get a wallet account and last 20 transactions
      parameters:
        - in: path
          name: walletId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Wallet data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

  /api/wallets/{walletId}/transactions:
    get:
      tags: [Wallet]
      summary: List transactions for a wallet
      parameters:
        - in: path
          name: walletId
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
            maximum: 500
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

  /api/wallets/{walletId}/topup:
    post:
      tags: [Wallet]
      summary: Top up a specific wallet
      parameters:
        - in: path
          name: walletId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: number
                reason:
                  type: string
      responses:
        "200":
          description: Transaction record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"

  /api/wallets/{walletId}/withdraw:
    post:
      tags: [Wallet]
      summary: Withdraw from a wallet
      parameters:
        - in: path
          name: walletId
          required: true
          schema:
            type: string
