    post:
      tags: [Spillevett]
      summary: Export activity report as PDF (download or email)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                period:
                  type: string
                  enum: [today, last7, last30, last365]
                  default: last365
                hallId:
                  type: string
                delivery:
                  type: string
                  enum: [download, email]
                  default: download
                email:
                  type: string
                  format: email
                  description: Recipient email for email delivery (defaults to account email)
      responses:
        "200":
          description: PDF binary (download) or confirmation object (email)

