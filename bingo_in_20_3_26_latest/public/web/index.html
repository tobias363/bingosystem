<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>SPILLORAMA</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: url('TemplateData/bg.png') center / cover no-repeat fixed;
    }
    /* Iframe game overlay - vises over Unity når et iframe-spill startes */
    #game-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 900;
      background: #1a1a2e;
    }
    #game-overlay.active {
      display: block;
    }
    #game-overlay iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    #game-overlay-back {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 950;
      background: rgba(0,0,0,0.65);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 10px;
      padding: 10px 22px;
      font-size: 15px;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      display: none;
    }
    #game-overlay-back:hover {
      background: rgba(0,0,0,0.85);
    }
    /* BIN-134: Skjul CandyMania-tile til bruker er innlogget */
    #ext-games-wrap { display: none !important; }
    body.player-authenticated #ext-games-wrap { display: flex !important; }
  </style>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>

</head>

<body>
  <!-- Iframe overlay for integrerte spill (CandyMania etc.) -->
  <div id="game-overlay">
    <button id="game-overlay-back" onclick="closeGameOverlay()">&#8592; Tilbake til lobby</button>
  </div>

  <div id="unity-container" class="unity-desktop" style="width:100%; height:100%; overflow:hidden">
    <canvas id="unity-canvas" width=960 height=600></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
    <div id="unity-warning"> </div>
    <div id="unity-footer">
      <div id="unity-webgl-logo"></div>
      <div id="unity-fullscreen-button"></div>
      <div id="unity-build-title">SPILLORAMA</div>
    </div>
  </div>
  <script>
    // ─── Logging (console only) ────────────────────────────────────
    function dbg(msg) { console.log('[BIN-134]', msg); }

    // ─── Auth-gating: Unity must be loaded before tile is shown ────
    var _unityLoaded = false;

    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var fullscreenButton = document.querySelector("#unity-fullscreen-button");
    var warningBanner = document.querySelector("#unity-warning");

    // Shows a temporary message banner/ribbon for a few seconds, or
    // a permanent error message on top of the canvas if type=='error'.
    // If type=='warning', a yellow highlight color is used.
    // Modify or remove this function to customize the visually presented
    // way that non-critical warnings and error messages are presented to the
    // user.
    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
      }
      var div = document.createElement('div');
      div.innerHTML = msg;
      warningBanner.appendChild(div);
      if (type == 'error') div.style = 'background: red; padding: 10px;';
      else {
        if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
        setTimeout(function () {
          warningBanner.removeChild(div);
          updateBannerVisibility();
        }, 5000);
      }
      updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/Spillorama.loader.js";
    var config = {
      dataUrl: buildUrl + "/Spillorama.data.unityweb",
      frameworkUrl: buildUrl + "/Spillorama.framework.js.unityweb",
        codeUrl: buildUrl + "/Spillorama.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
        companyName: "AIS Technolabs",
        productName: "SPILLORAMA",
        productVersion: "8.1",
        showBanner: unityShowBanner,
      };

    // By default Unity keeps WebGL canvas render target size matched with
    // the DOM size of the canvas element (scaled by window.devicePixelRatio)
    // Set this to false if you want to decouple this synchronization from
    // happening inside the engine, and you would instead like to size up
    // the canvas DOM size and WebGL render target sizes yourself.
    // config.matchWebGLToCanvasSize = false;

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      // Mobile device style: fill the whole browser client area with the game canvas:

      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);
      container.className = "unity-mobile";
      canvas.className = "unity-mobile";

      // To lower canvas resolution on mobile devices to gain some
      // performance, uncomment the following line:
      // config.devicePixelRatio = 1;

      //unityShowBanner('WebGL builds are not supported on mobile devices.');
    } else {
      // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:

      canvas.style.width = "100%";
      canvas.style.height = "100%";
    }

    canvas.style.background = "url('" + buildUrl + "/Spillorama.jpg') center / cover";
    loadingBar.style.display = "block";

    // ─── BIN-134: intercept CORS-blocked image requests from external server ──
    // Unity loads images via both XHR and fetch() from spillorama.aistechnolabs.info
    // which blocks CORS from the Render domain. Rewrite those URLs to
    // use the same-origin /api/proxy/extimg/ endpoint instead.
    (function() {
      var EXT_HOST = 'https://spillorama.aistechnolabs.info/';

      function rewriteUrl(url) {
        if (typeof url === 'string' && url.indexOf(EXT_HOST) === 0) {
          var path = url.substring(EXT_HOST.length);
          if (/\.(png|jpe?g|gif|webp|svg)/i.test(path)) {
            var newUrl = '/api/proxy/extimg/' + path;
            dbg('Image proxy: ' + path);
            return newUrl;
          }
        }
        return null;
      }

      // Intercept XMLHttpRequest
      var _origOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url) {
        var rewritten = rewriteUrl(url);
        if (rewritten) url = rewritten;
        return _origOpen.apply(this, [method, url].concat(Array.prototype.slice.call(arguments, 2)));
      };

      // Intercept fetch()
      var _origFetch = window.fetch;
      window.fetch = function(input) {
        var url = typeof input === 'string' ? input : (input && input.url);
        var rewritten = rewriteUrl(url);
        if (rewritten) {
          if (typeof input === 'string') {
            arguments[0] = rewritten;
          } else if (input && input.url) {
            arguments[0] = new Request(rewritten, input);
          }
        }
        return _origFetch.apply(this, arguments);
      };

      dbg('Image proxy interceptor installed (XHR + fetch)');
    })();

    dbg('Loading Unity from: ' + loaderUrl);
    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onerror = function() { dbg('FATAL: Unity loader script failed to load: ' + loaderUrl, 'err'); };
    script.onload = () => {
      dbg('Unity loader script loaded, creating instance...', 'ok');
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = 100 * progress + "%";
        if (progress >= 1) dbg('Unity load progress: 100%', 'ok');
      }).then((unityInstance) => {
        dbg('Unity instance created successfully');
        loadingBar.style.display = "none";
        _unityLoaded = true;
        fullscreenButton.onclick = () => {
          window.vuplex.SetFullscreen(1)/*https://support.vuplex.com/articles/webgl-fullscreen*/;
        };

        // Initialize Firebase Cloud Messaging
        const firebaseConfig = {
          apiKey: "AIzaSyCn63hcAqgw-iWLRFCxKmJk6Wa6UrK8Ucc",
          authDomain: "spillorama-bingo-ca229.firebaseapp.com",
          databaseURL: "https://spillorama-bingo-ca229-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "spillorama-bingo-ca229",
          storageBucket: "spillorama-bingo-ca229.firebasestorage.app",
          messagingSenderId: "360754039754",
          appId: "1:360754039754:web:78c18c50fed1b2ad509d33",
          measurementId: "G-8WZJB8ECSW"
        };

        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();

        // Get the path where index.html is hosted (like /web/, /game/, / or /custom/path/)
        let swDir = window.location.pathname.replace(/[^\/]+$/, '');
        let swPath = swDir + 'firebase-messaging-sw.js';

        navigator.serviceWorker.register(swPath, {
          scope: swDir
        }).then((registration) => {
          console.log("✅ Service worker registered");
          // ✅ Call getToken with service worker reference
          Notification.requestPermission().then((permission) => {
            if (permission === 'granted') {
              messaging.getToken({
                vapidKey: "BO8GlGnlSoBYtA0oZx6SzY-dlLNdh__TeFS6WNIY5X_SWsXfejE-B5I9gsn6O6a0rCYt8eOXTCO7-lcVAOgsPMc",
                serviceWorkerRegistration: registration
              }).then((token) => {
                console.log("Web Push Token:", token);
                unityInstance.SendMessage('FirebaseManager', 'OnWebTokenReceived', token);
              }).catch((err) => {
                console.error("FCM getToken error:", err);
              });
            } else {
              console.warn("Notification permission not granted");
            }
          });
        });

        // Foreground push messages
        messaging.onMessage((payload) => {
          console.log('Push received in foreground:', payload);
          unityInstance.SendMessage('FirebaseManager', 'OnWebMessageReceived', JSON.stringify(payload));
                // Forward to service worker for native notification
                const title = payload.notification?.title || 'Notification';
    const body = payload.notification?.body || '';
    const icon = '/TemplateData/favicon.ico';
    const staticURL = 'https://spillorama.aistechnolabs.info/web/';

    if (Notification.permission === 'granted') {
      new Notification(title, {
        body,
        icon,
        data: { url: staticURL }
      }).onclick = function (event) {
        event.preventDefault();
        window.open(staticURL, '_blank');
      };
    }
        });

      }).catch((message) => {
        dbg('FATAL: Unity failed to load: ' + message, 'err');
      });
    };
    document.body.appendChild(script);
    const channel = new BroadcastChannel("focusSpiloramaWeb");
    channel.onmessage = (event) => {
      if (event.data === "focus-tab") {
        window.focus();
      }
    };

    let existingTab = null;

    // ─── BIN-134: Auth-beacon via HTTP-polling ────────────────────────────────
    // Unity sin Socket.IO kjører internt i WASM og er utilgjengelig fra JS.
    // Vi poller /api/integration/auth-beacon hvert 3. sekund for å oppdage
    // at en spiller er innlogget, og kaller SetPlayerToken() når den er det.
    (function() {
      dbg('Auth-beacon polling startet (hver 3s)');
      var pollCount = 0;
      var pollInterval = setInterval(function() {
        if (_playerToken) {
          clearInterval(pollInterval);
          dbg('Auth-beacon polling stoppet — allerede autentisert', 'ok');
          return;
        }
        pollCount++;
        fetch('/api/integration/auth-beacon')
          .then(function(r) {
            dbg('auth-beacon HTTP ' + r.status + ' (poll #' + pollCount + ')');
            return r.json();
          })
          .then(function(data) {
            if (!_unityLoaded) {
              dbg('auth-beacon ignorert — Unity ikke lastet ennå');
              return;
            }
            if (data && data.authenticated && data.token && !_playerToken) {
              dbg('Token mottatt fra auth-beacon, kilde: ' + (data.source || 'ukjent'));
              SetPlayerToken(data.token);
              clearInterval(pollInterval);
            }
          })
          .catch(function(err) { dbg('auth-beacon feil: ' + err.message); });
      }, 3000);
    })();

    // URL-er som skal åpnes i iframe-overlay istedenfor ny fane
    const iframeGames = ['/candy/', '/candy-game/'];

    function isIframeGame(url) {
      return iframeGames.some(function(path) {
        return url.indexOf(path) !== -1;
      });
    }

    function openGameInIframe(url) {
      var overlay = document.getElementById('game-overlay');
      var backBtn = document.getElementById('game-overlay-back');
      var oldFrame = overlay.querySelector('iframe');
      if (oldFrame) oldFrame.remove();

      dbg('openGameInIframe called, url=' + url);

      // For candy games: get auto-login token and load React SPA directly
      if (url.indexOf('/candy') !== -1 && _playerToken) {
        dbg('Fetching candy auto-login from /api/integration/candy-launch...');
        fetch('/api/integration/candy-launch', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + _playerToken,
            'Content-Type': 'application/json'
          }
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          dbg('candy-launch response: ' + JSON.stringify(data));
          if (data && data.success && data.embedUrl) {
            dbg('Loading candy game directly: ' + data.embedUrl, 'ok');
            _loadIframe(overlay, backBtn, data.embedUrl);
          } else {
            dbg('candy-launch failed: ' + JSON.stringify(data), 'err');
          }
        })
        .catch(function(err) {
          dbg('candy-launch fetch failed: ' + err.message, 'err');
        });
        return;
      }

      // Non-candy games: use URL directly
      _loadIframe(overlay, backBtn, url);
    }

    function _loadIframe(overlay, backBtn, resolvedUrl) {
      dbg('Loading iframe: ' + resolvedUrl, 'ok');
      var iframe = document.createElement('iframe');
      iframe.src = resolvedUrl;
      iframe.allow = 'autoplay; fullscreen';
      iframe.style.background = '#1a1a2e';
      iframe.onerror = function() { dbg('IFRAME onerror fired'); };
      iframe.onload = function() { dbg('IFRAME onload fired'); };
      overlay.appendChild(iframe);
      overlay.classList.add('active');
      backBtn.style.display = 'block';
      dbg('Overlay activated, iframe added to DOM', 'ok');
    }

    function closeGameOverlay() {
      dbg('closeGameOverlay called');
      var overlay = document.getElementById('game-overlay');
      var backBtn = document.getElementById('game-overlay-back');
      var iframe = overlay.querySelector('iframe');
      if (iframe) iframe.remove();
      overlay.classList.remove('active');
      backBtn.style.display = 'none';
    }

    // ─── Wallet-bro: PostMessage mellom iframe-spill og bingo-backend ──────
    // Candy-iframen sender meldinger som { type: 'candy:getBalance', requestId: '...' }
    // Lobbyen videresender til /api/integration/wallet/* og returnerer svar
    var _playerToken = null; // Settes av Unity via SetPlayerToken()
    var _isLoggedIn = false;

    function SetPlayerToken(token) {
      dbg('SetPlayerToken kalt, token=' + (token ? token.substring(0,20) + '...' : 'null'));
      _playerToken = token;
      if (token) {
        _isLoggedIn = true;
        document.body.classList.add('player-authenticated');
        dbg('player-authenticated klasse satt på body — CandyMania tile skal nå vises', 'ok');
      }
    }

    // Tillatte origins for postMessage (CandyMania + egen origin)
    var ALLOWED_GAME_ORIGINS = [
      window.location.origin,
      'https://candy-backend-ldvg.onrender.com'
    ];

    window.addEventListener('message', async function(event) {
      // Sjekk at meldingen kommer fra en tillatt kilde
      if (ALLOWED_GAME_ORIGINS.indexOf(event.origin) === -1) {
        if (event.data && event.data.type && String(event.data.type).startsWith('candy:')) {
          dbg('PostMessage BLOKKERT fra origin: ' + event.origin, 'err');
        }
        return;
      }
      var msg = event.data;
      if (!msg || !msg.type || !msg.type.startsWith('candy:')) return;
      dbg('PostMessage mottatt: ' + msg.type + ' fra ' + event.origin);

      var iframe = document.querySelector('#game-overlay iframe');
      if (!iframe) { dbg('PostMessage ignorert — ingen iframe funnet', 'warn'); return; }

      // Svar-hjelper
      function reply(type, data) {
        iframe.contentWindow.postMessage({ type: type, requestId: msg.requestId, data: data }, '*');
      }

      try {
        switch (msg.type) {
          case 'candy:ready':
            // Spillet er klart — send spillertoken så candy kan vise saldo
            reply('host:init', { token: _playerToken });
            break;

          case 'candy:getBalance':
            var balRes = await fetch('/api/integration/wallet/balance', {
              headers: { 'Authorization': 'Bearer ' + _playerToken }
            });
            var balData = await balRes.json();
            reply('host:balance', balData.success ? balData.data : { error: balData.error });
            break;

          case 'candy:debit':
            var debRes = await fetch('/api/integration/wallet/debit', {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer ' + _playerToken,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                amount: msg.amount,
                gameId: msg.gameId,
                idempotencyKey: msg.idempotencyKey,
                description: msg.description || 'CandyMania Bet'
              })
            });
            var debData = await debRes.json();
            reply('host:debitResult', debData.success ? debData.data : { error: debData.error });
            break;

          case 'candy:credit':
            var credRes = await fetch('/api/integration/wallet/credit', {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer ' + _playerToken,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                amount: msg.amount,
                gameId: msg.gameId,
                idempotencyKey: msg.idempotencyKey,
                description: msg.description || 'CandyMania Win'
              })
            });
            var credData = await credRes.json();
            reply('host:creditResult', credData.success ? credData.data : { error: credData.error });
            break;

          case 'candy:close':
            closeGameOverlay();
            break;
        }
      } catch (err) {
        dbg('Wallet bridge error: ' + err.message, 'err');
        reply('host:error', { error: err.message });
      }
    });

    function OpenUrlInSameTab(url) {
      dbg('OpenUrlInSameTab kalt, url=' + url);
      // BIN-134: Iframe-spill krever innlogging (playerToken settes av Unity etter login)
      if (isIframeGame(url)) {
        if (!_playerToken) {
          dbg('CandyMania blokkert — ingen playerToken ennå', 'warn');
          return;
        }
        dbg('Åpner iframe-spill: ' + url, 'ok');
        openGameInIframe(url);
        return;
      }
      // Ellers åpne i ny fane som vanlig (bingo etc.)
      if (existingTab && !existingTab.closed) {
        existingTab.focus();
      } else {
        existingTab = window.open(url, 'myUniqueTab');
      }
    }

    // function ShowBrowserNotification(title, body) {
    //   if (Notification.permission === "granted") {
    //     new Notification(title, { body: body });
    //   } else if (Notification.permission !== "denied") {
    //     Notification.requestPermission().then(function (permission) {
    //       if (permission === "granted") {
    //         new Notification(title, { body: body });
    //       }
    //     });
    //   }
    // }
  </script>
  <script src="external-games.js"></script>
</body>
