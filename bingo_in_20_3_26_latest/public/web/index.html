<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>SPILLORAMA</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: url('TemplateData/bg.png') center / cover no-repeat fixed;
    }
    /* Iframe game overlay - vises over Unity når et iframe-spill startes */
    #game-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 900;
      background: #1a1a2e;
    }
    #game-overlay.active {
      display: block;
    }
    #game-overlay iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    #game-overlay-back {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 950;
      background: rgba(0,0,0,0.65);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 10px;
      padding: 10px 22px;
      font-size: 15px;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      display: none;
    }
    #game-overlay-back:hover {
      background: rgba(0,0,0,0.85);
    }
    /* BIN-134: Skjul CandyMania-tile til bruker er innlogget */
    #ext-games-wrap { display: none !important; }
    body.player-authenticated #ext-games-wrap { display: flex !important; }
  </style>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>

</head>

<body>
  <!-- Iframe overlay for integrerte spill (CandyMania etc.) -->
  <div id="game-overlay">
    <button id="game-overlay-back" onclick="closeGameOverlay()">&#8592; Tilbake til lobby</button>
  </div>

  <div id="unity-container" class="unity-desktop" style="width:100%; height:100%; overflow:hidden">
    <canvas id="unity-canvas" width=960 height=600></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
    <div id="unity-warning"> </div>
    <div id="unity-footer">
      <div id="unity-webgl-logo"></div>
      <div id="unity-fullscreen-button"></div>
      <div id="unity-build-title">SPILLORAMA</div>
    </div>
  </div>
  <script>
    // ── WebSocket URL rewrite ──────────────────────────────────────────
    // Unity WASM has the old server URL hardcoded. We intercept WebSocket
    // creation and rewrite it to the current host (Render) so all Socket.IO
    // traffic goes through this server instead of the legacy one.
    // This avoids having to rebuild the Unity WebGL build.
    // WebSocket URL rewriting is NOT possible without breaking Unity WASM
    // (Emscripten's invoke_iiii does strict type checks on WebSocket).
    // Unity connects to the old server — that's fine. Login sets authToken
    // in shared MongoDB, and auth-beacon reads it from there.

    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var fullscreenButton = document.querySelector("#unity-fullscreen-button");
    var warningBanner = document.querySelector("#unity-warning");

    // Shows a temporary message banner/ribbon for a few seconds, or
    // a permanent error message on top of the canvas if type=='error'.
    // If type=='warning', a yellow highlight color is used.
    // Modify or remove this function to customize the visually presented
    // way that non-critical warnings and error messages are presented to the
    // user.
    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
      }
      var div = document.createElement('div');
      div.innerHTML = msg;
      warningBanner.appendChild(div);
      if (type == 'error') div.style = 'background: red; padding: 10px;';
      else {
        if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
        setTimeout(function () {
          warningBanner.removeChild(div);
          updateBannerVisibility();
        }, 5000);
      }
      updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/Spillorama.loader.js";
    var config = {
      dataUrl: buildUrl + "/Spillorama.data.unityweb",
      frameworkUrl: buildUrl + "/Spillorama.framework.js.unityweb",
        codeUrl: buildUrl + "/Spillorama.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
        companyName: "AIS Technolabs",
        productName: "SPILLORAMA",
        productVersion: "8.1",
        showBanner: unityShowBanner,
      };

    // By default Unity keeps WebGL canvas render target size matched with
    // the DOM size of the canvas element (scaled by window.devicePixelRatio)
    // Set this to false if you want to decouple this synchronization from
    // happening inside the engine, and you would instead like to size up
    // the canvas DOM size and WebGL render target sizes yourself.
    // config.matchWebGLToCanvasSize = false;

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      // Mobile device style: fill the whole browser client area with the game canvas:

      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);
      container.className = "unity-mobile";
      canvas.className = "unity-mobile";

      // To lower canvas resolution on mobile devices to gain some
      // performance, uncomment the following line:
      // config.devicePixelRatio = 1;

      //unityShowBanner('WebGL builds are not supported on mobile devices.');
    } else {
      // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:

      canvas.style.width = "100%";
      canvas.style.height = "100%";
    }

    canvas.style.background = "url('" + buildUrl + "/Spillorama.jpg') center / cover";
    loadingBar.style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = 100 * progress + "%";
      }).then((unityInstance) => {
        loadingBar.style.display = "none";
        fullscreenButton.onclick = () => {
          window.vuplex.SetFullscreen(1)/*https://support.vuplex.com/articles/webgl-fullscreen*/;
        };

        // Initialize Firebase Cloud Messaging
        const firebaseConfig = {
          apiKey: "AIzaSyCn63hcAqgw-iWLRFCxKmJk6Wa6UrK8Ucc",
          authDomain: "spillorama-bingo-ca229.firebaseapp.com",
          databaseURL: "https://spillorama-bingo-ca229-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "spillorama-bingo-ca229",
          storageBucket: "spillorama-bingo-ca229.firebasestorage.app",
          messagingSenderId: "360754039754",
          appId: "1:360754039754:web:78c18c50fed1b2ad509d33",
          measurementId: "G-8WZJB8ECSW"
        };

        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();

        // Get the path where index.html is hosted (like /web/, /game/, / or /custom/path/)
        let swDir = window.location.pathname.replace(/[^\/]+$/, '');
        let swPath = swDir + 'firebase-messaging-sw.js';

        navigator.serviceWorker.register(swPath, {
          scope: swDir
        }).then((registration) => {
          console.log("✅ Service worker registered");
          // ✅ Call getToken with service worker reference
          Notification.requestPermission().then((permission) => {
            if (permission === 'granted') {
              messaging.getToken({
                vapidKey: "BO8GlGnlSoBYtA0oZx6SzY-dlLNdh__TeFS6WNIY5X_SWsXfejE-B5I9gsn6O6a0rCYt8eOXTCO7-lcVAOgsPMc",
                serviceWorkerRegistration: registration
              }).then((token) => {
                console.log("Web Push Token:", token);
                unityInstance.SendMessage('FirebaseManager', 'OnWebTokenReceived', token);
              }).catch((err) => {
                console.error("FCM getToken error:", err);
              });
            } else {
              console.warn("Notification permission not granted");
            }
          });
        });

        // Foreground push messages
        messaging.onMessage((payload) => {
          console.log('Push received in foreground:', payload);
          unityInstance.SendMessage('FirebaseManager', 'OnWebMessageReceived', JSON.stringify(payload));
                // Forward to service worker for native notification
                const title = payload.notification?.title || 'Notification';
    const body = payload.notification?.body || '';
    const icon = '/TemplateData/favicon.ico';
    const staticURL = 'https://spillorama.aistechnolabs.info/web/';

    if (Notification.permission === 'granted') {
      new Notification(title, {
        body,
        icon,
        data: { url: staticURL }
      }).onclick = function (event) {
        event.preventDefault();
        window.open(staticURL, '_blank');
      };
    }
        });

      }).catch((message) => {
        alert(message);
      });
    };
    document.body.appendChild(script);
    const channel = new BroadcastChannel("focusSpiloramaWeb");
    channel.onmessage = (event) => {
      if (event.data === "focus-tab") {
        window.focus();
      }
    };

    let existingTab = null;

    // ─── BIN-134: Auth-beacon — venter på Unity-interaksjon ─────────────────────
    // Starter polling etter at brukeren har interagert med Unity-canvasen
    // (mousedown fanges bedre enn click fordi Unity konsumerer click-events).
    (function() {
      var pollingStarted = false;

      function onCanvasInteraction() {
        if (pollingStarted || _playerToken) return;
        pollingStarted = true;
        // Vent 2 sekunder etter interaksjon (tid til å logge inn)
        setTimeout(startAuthBeaconPolling, 2000);
      }

      // Lytt på flere event-typer for å fange interaksjon
      var unityCanvas = document.getElementById('unity-canvas');
      if (unityCanvas) {
        unityCanvas.addEventListener('mousedown', onCanvasInteraction);
        unityCanvas.addEventListener('touchstart', onCanvasInteraction);
      }
      // Fallback: start polling 15s etter sideinnlasting
      // (for auto-login tilfeller der brukeren allerede er innlogget)
      setTimeout(function() {
        if (!pollingStarted && !_playerToken) {
          pollingStarted = true;
          startAuthBeaconPolling();
        }
      }, 15000);

      function startAuthBeaconPolling() {
        console.log('BIN-134: auth-beacon polling starter');
        var pollInterval = setInterval(function() {
          if (_playerToken) {
            clearInterval(pollInterval);
            return;
          }
          fetch('/api/integration/auth-beacon')
            .then(function(r) { return r.json(); })
            .then(function(data) {
              if (data && data.authenticated && data.token && !_playerToken) {
                SetPlayerToken(data.token);
                clearInterval(pollInterval);
                console.log('BIN-134: playerToken mottatt via auth-beacon');
              }
            })
            .catch(function() {});
        }, 2000);
      }
    })();

    // URL-er som skal åpnes i iframe-overlay istedenfor ny fane
    // Legg til flere spill her etter hvert som de integreres
    // Spill som skal åpnes i iframe-overlay
    const EXTERNAL_GAMES = [
      {
        // CandyMania — dynamisk launch-token hentes fra candy-backend
        pattern: '/candy/',
        dynamic: true  // Hent fersk token via /api/integration/candy-launch
      },
      { pattern: '/candy-game/', dynamic: false }
    ];
    const iframeGames = EXTERNAL_GAMES.map(function(g) { return g.pattern; });

    function isIframeGame(url) {
      return iframeGames.some(function(path) {
        return url.indexOf(path) !== -1;
      });
    }

    function openGameInIframe(url) {
      var overlay = document.getElementById('game-overlay');
      var backBtn = document.getElementById('game-overlay-back');
      // Fjern eventuelt eksisterende iframe
      var oldFrame = overlay.querySelector('iframe');
      if (oldFrame) oldFrame.remove();

      // Sjekk om spillet trenger dynamisk launch-token
      var game = null;
      for (var i = 0; i < EXTERNAL_GAMES.length; i++) {
        if (url.indexOf(EXTERNAL_GAMES[i].pattern) !== -1) {
          game = EXTERNAL_GAMES[i];
          break;
        }
      }

      if (game && game.dynamic) {
        // Hent fersk launch-token fra bingo-backend → candy-backend
        fetch('/api/integration/candy-launch')
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.success && data.data && data.data.iframeUrl) {
              loadIframe(overlay, backBtn, data.data.iframeUrl);
            } else {
              console.error('Candy launch failed:', data);
              alert('Kunne ikke starte CandyMania. Prøv igjen.');
            }
          })
          .catch(function(err) {
            console.error('Candy launch error:', err);
            alert('Kunne ikke starte CandyMania. Prøv igjen.');
          });
        return;
      }

      loadIframe(overlay, backBtn, url);
    }

    function loadIframe(overlay, backBtn, url) {
      var iframe = document.createElement('iframe');
      iframe.src = url;
      iframe.allow = 'autoplay; fullscreen';
      overlay.appendChild(iframe);
      overlay.classList.add('active');
      backBtn.style.display = 'block';
    }

    function closeGameOverlay() {
      var overlay = document.getElementById('game-overlay');
      var backBtn = document.getElementById('game-overlay-back');
      var iframe = overlay.querySelector('iframe');
      if (iframe) iframe.remove();
      overlay.classList.remove('active');
      backBtn.style.display = 'none';
    }

    // ─── Wallet-bro: PostMessage mellom iframe-spill og bingo-backend ──────
    // Candy-iframen sender meldinger som { type: 'candy:getBalance', requestId: '...' }
    // Lobbyen videresender til /api/integration/wallet/* og returnerer svar
    var _playerToken = null; // Settes av Unity via SetPlayerToken()
    var _isLoggedIn = false;

    function SetPlayerToken(token) {
      _playerToken = token;
      if (token) {
        _isLoggedIn = true;
        // BIN-134: Vis CandyMania-tile nå som brukeren er innlogget
        document.body.classList.add('player-authenticated');
      }
    }

    // Tillatte origins for postMessage (CandyMania + egen origin)
    var ALLOWED_GAME_ORIGINS = [
      window.location.origin,
      'https://bingosystem-staging.onrender.com'
    ];

    window.addEventListener('message', async function(event) {
      // Sjekk at meldingen kommer fra en tillatt kilde
      if (ALLOWED_GAME_ORIGINS.indexOf(event.origin) === -1) return;
      var msg = event.data;
      if (!msg || !msg.type || !msg.type.startsWith('candy:')) return;

      var iframe = document.querySelector('#game-overlay iframe');
      if (!iframe) return;

      // Svar-hjelper
      function reply(type, data) {
        iframe.contentWindow.postMessage({ type: type, requestId: msg.requestId, data: data }, '*');
      }

      try {
        switch (msg.type) {
          case 'candy:ready':
            // Spillet er klart — send spillertoken så candy kan vise saldo
            reply('host:init', { token: _playerToken });
            break;

          case 'candy:getBalance':
            var balRes = await fetch('/api/integration/wallet/balance', {
              headers: { 'Authorization': 'Bearer ' + _playerToken }
            });
            var balData = await balRes.json();
            reply('host:balance', balData.success ? balData.data : { error: balData.error });
            break;

          case 'candy:debit':
            var debRes = await fetch('/api/integration/wallet/debit', {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer ' + _playerToken,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                amount: msg.amount,
                gameId: msg.gameId,
                idempotencyKey: msg.idempotencyKey,
                description: msg.description || 'CandyMania Bet'
              })
            });
            var debData = await debRes.json();
            reply('host:debitResult', debData.success ? debData.data : { error: debData.error });
            break;

          case 'candy:credit':
            var credRes = await fetch('/api/integration/wallet/credit', {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer ' + _playerToken,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                amount: msg.amount,
                gameId: msg.gameId,
                idempotencyKey: msg.idempotencyKey,
                description: msg.description || 'CandyMania Win'
              })
            });
            var credData = await credRes.json();
            reply('host:creditResult', credData.success ? credData.data : { error: credData.error });
            break;

          case 'candy:close':
            closeGameOverlay();
            break;
        }
      } catch (err) {
        console.error('Wallet bridge error:', err);
        reply('host:error', { error: err.message });
      }
    });

    function OpenUrlInSameTab(url) {
      // BIN-134: Iframe-spill krever innlogging (playerToken settes av Unity etter login)
      if (isIframeGame(url)) {
        if (!_playerToken) {
          console.warn('CandyMania blokkert: bruker er ikke innlogget');
          return;
        }
        openGameInIframe(url);
        return;
      }
      // Ellers åpne i ny fane som vanlig (bingo etc.)
      if (existingTab && !existingTab.closed) {
        existingTab.focus();
      } else {
        existingTab = window.open(url, 'myUniqueTab');
      }
    }

    // function ShowBrowserNotification(title, body) {
    //   if (Notification.permission === "granted") {
    //     new Notification(title, { body: body });
    //   } else if (Notification.permission !== "denied") {
    //     Notification.requestPermission().then(function (permission) {
    //       if (permission === "granted") {
    //         new Notification(title, { body: body });
    //       }
    //     });
    //   }
    // }
  </script>
  <script src="external-games.js"></script>
</body>

</html>
