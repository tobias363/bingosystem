<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CandyMania - Spillorama</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    #game-frame {
      width: 100%;
      height: 100%;
      border: none;
    }
    #back-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 9999;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 14px;
      font-family: 'Segoe UI', Arial, sans-serif;
      cursor: pointer;
      transition: background 0.15s;
    }
    #back-btn:hover { background: rgba(0,0,0,0.8); }
  </style>
</head>
<body>
  <button id="back-btn" onclick="goBack()">← Tilbake til lobby</button>
  <iframe id="game-frame" src="/candy/" allow="autoplay; fullscreen"></iframe>
  <script>
    function goBack() {
      // Navigate back to the Spillorama lobby
      window.location.href = '/web/';
    }

    // Also allow the parent (Unity) to communicate via postMessage
    window.addEventListener('message', function(event) {
      if (event.data === 'close-game') {
        goBack();
      }
    });
  </script>
</body>
</html>
