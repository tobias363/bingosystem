{% extends "partition/layout.html" %}
{% block body %}
<!-- <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"> -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css">
<link rel="stylesheet" href="{{config.baseUrl}}/plugins/sweetalert2/sweetalert2.min.css" />
<style>
    .summernote {
        width: 100% !important;
        max-width: 100%;
        margin: auto;
    }

    .card-body {
        width: 100%;
    }

    .container-fluid {
        max-width: 90%;
        /* Adjust width as needed */
    }

    .card-header h2 {
        margin: 0 auto;
        /* Center heading */
    }

    .d-flex {
        display: flex;
        justify-content: center;
    }
</style>

<!-- Main Content -->
<div class="page-wrapper">
    <div class="container-fluid">

        <!-- Breadcrumb -->
        <section class="content-header">
            <h1>{{settings.system_information}}</h1>
            <ol class="breadcrumb">
                <li><a href="/dashboard"><i class="fa fa-dashboard"></i> {{settings.dashboard}}</a></li>
                <li class="active">{{settings.system_information}}</li>
            </ol>
        </section>
        <!-- /Breadcrumb -->

        <!-- /Title -->
        {% include "partition/notification.html" %}
        <!-- Row -->
        <section class="content">
            <div class="container-fluid">
                <div class="row justify-content-center">
                    <div class="col-md-12">
                        <div class="card text-center"> <!-- Center text -->
                            <div class="card-body">
                                <input type="hidden" id="cmsId" name="cmsId" value="{{cmsData._id}}">
                                <input type="hidden" id="content" name="content" value="{{cmsData.content}}">
                                <div class="summernote"></div>
                                <div class="mt-3 d-flex justify-content-center"> <!-- Center Buttons -->

                                    <button type="button" class="btn btn-danger mx-2 mr-2" data-dismiss="modal"
                                        aria-label="Close" onclick="window.history.back()">
                                        {{settings.cancel}}
                                    </button>
                                    <!-- <button id="save" class="btn btn-primary mx-2" hidden=`{{session.role}}` == "agent">{{settings.update}}</button> -->
                                    {% if editFlag %}
                                    <button id="save" class="btn btn-primary mx-2" {% if session.role=="agent"
                                        %}style="display:none;" {% endif %}>
                                        {{ settings.update }}
                                    </button>
                                    {% endif %}
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- /.container-fluid -->
        </section>
        <!-- /Row -->
    </div>
</div>

{% endblock %}

{% block Jscript %}
<!-- jQuery (Must be First) -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Bootstrap & Popper -->
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.bundle.min.js"></script>

<!-- Summernote (After jQuery) -->
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>

<script>
    $(document).ready(function () {

        const host = window.location.origin;
        const url = host + "/system/editSystemInformation";

        // let setting = JSON.parse(`{{ setting | dump | safe }}`);
        let setting = JSON.parse(`{{ setting | dump | safe | replace('\\', '\\\\') | replace('"', '\\"') }}`);
        let settings = JSON.parse(`{{ settings | dump | safe }}`);

        let userRole = `{{ session.role }}`; // Get the user role from sessio

        $('.summernote').summernote({
            height: 300,
            tabDisable: false,
            disableDragAndDrop: true,
            toolbar: [
                ['style', ['bold', 'italic', 'underline', 'clear', 'undo', 'redo']],
                ['font', ['strikethrough', 'superscript', 'subscript']],
                ['fontsize', ['fontsize']],
                ['color', ['color']],
                ['para', ['ul', 'ol', 'paragraph']],
                ['height'],
                ['insert', ['link']],
                // ['view', ['fullscreen', 'codeview', 'help']],
            ],
            callbacks: {
                onInit: function () {
                    let defaultText = setting.systemInformationData || "";
                    console.log("Setting default content:", defaultText);
                    $('.summernote').summernote('code', defaultText);

                    // Disable editor if role is agent
                    if (userRole === "agent") {
                        $('.summernote').summernote('disable');
                    }
                }
            }
        });


        if ($('#content').val()) {
            $('.summernote').summernote('pasteHTML', $('#content').val());
        }

        $("#save").click(function () {
            const content = $('.summernote').summernote('code');
            let token = localStorage.getItem('token');

            swal({
                title: `${settings.alert}!`,
                text: `${settings.are_you_want_to_add_extra_data}?`,
                type: "warning",
                showCancelButton: true,
                confirmButtonColor: "#e69a2a",
                confirmButtonText: `${settings.add}`,
                cancelButtonText: `${settings.cancel}`,
                html: true
            }, async function (isConfirm) {
                if (isConfirm) {
                    console.log("stop the game")
                    $.ajax({
                        type: 'POST',
                        url: url,
                        data: { content: content },
                        success: function (resultData) {
                            if (resultData) {
                                console.log("request successfull.");
                                swal("Success!", resultData.message, "success");
                            } else {
                                swal("Failed!", resultData.message, "error");
                            }
                        }
                    });
                }
            });

        })


    });

</script>
{% endblock %}
