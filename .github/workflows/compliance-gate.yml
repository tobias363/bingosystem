name: Compliance Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Type check backend
        run: npm --prefix backend run check

      - name: Build backend
        run: npm --prefix backend run build

      - name: Run compliance suite (required gate)
        run: npm --prefix backend run test:compliance

      - name: Run RTP / near-miss simulation gate
        run: npm --prefix backend run check:rtp-near-miss
