name: Deploy Candygame

on:
  workflow_dispatch:
    inputs:
      expected_release_version:
        description: Optional expected releaseVersion from release.json
        required: false
        type: string

concurrency:
  group: deploy-candygame
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Trigger Render candygame deploy hook
        env:
          CANDYGAME_DEPLOY_HOOK_URL: ${{ secrets.RENDER_CANDYGAME_DEPLOY_HOOK_URL || secrets.RENDER_KEY }}
          CANDYGAME_HEALTHCHECK_URL: ${{ secrets.RENDER_CANDYGAME_HEALTHCHECK_URL || vars.RENDER_CANDYGAME_HEALTHCHECK_URL || 'https://candygame-9q3h.onrender.com/' }}
          CANDYGAME_RELEASE_JSON_URL: ${{ vars.RENDER_CANDYGAME_RELEASE_JSON_URL || 'https://candygame-9q3h.onrender.com/release.json' }}
          CANDYGAME_DEPLOY_WAIT_TIMEOUT_SECONDS: ${{ vars.RENDER_CANDYGAME_WAIT_TIMEOUT_SECONDS || '900' }}
          CANDYGAME_DEPLOY_POLL_INTERVAL_SECONDS: ${{ vars.RENDER_CANDYGAME_POLL_INTERVAL_SECONDS || '10' }}
          CANDYGAME_DEPLOY_CURL_RETRIES: ${{ vars.RENDER_CANDYGAME_CURL_RETRIES || '3' }}
          EXPECTED_RELEASE_VERSION: ${{ inputs.expected_release_version }}
        run: |
          set -euo pipefail

          if [[ -z "${CANDYGAME_DEPLOY_HOOK_URL}" ]]; then
            echo "Mangler hook secret. Sett RENDER_CANDYGAME_DEPLOY_HOOK_URL eller RENDER_KEY." >&2
            exit 1
          fi

          echo "Trigger candygame deploy hook ..."
          curl -fsS \
            --retry "${CANDYGAME_DEPLOY_CURL_RETRIES}" \
            --retry-all-errors \
            --connect-timeout 10 \
            -X POST \
            "${CANDYGAME_DEPLOY_HOOK_URL}" >/dev/null

          echo "Venter på healthcheck: ${CANDYGAME_HEALTHCHECK_URL}"
          start_ts="$(date +%s)"

          while true; do
            if curl -fsS "${CANDYGAME_HEALTHCHECK_URL}" >/dev/null; then
              echo "Candygame healthcheck OK."
              break
            fi

            now_ts="$(date +%s)"
            elapsed="$((now_ts - start_ts))"
            if (( elapsed >= CANDYGAME_DEPLOY_WAIT_TIMEOUT_SECONDS )); then
              echo "Timeout etter ${CANDYGAME_DEPLOY_WAIT_TIMEOUT_SECONDS}s uten grønn candygame healthcheck." >&2
              exit 1
            fi

            sleep "${CANDYGAME_DEPLOY_POLL_INTERVAL_SECONDS}"
          done

          echo "Leser release fingerprint: ${CANDYGAME_RELEASE_JSON_URL}"
          release_json="$(curl -fsS "${CANDYGAME_RELEASE_JSON_URL}")"
          release_version="$(printf '%s' "${release_json}" | jq -r '.releaseVersion // empty')"
          release_commit="$(printf '%s' "${release_json}" | jq -r '.releaseCommit // empty')"

          if [[ -z "${release_version}" ]]; then
            echo "Fant ikke releaseVersion i release.json." >&2
            exit 1
          fi

          echo "releaseVersion=${release_version}"
          echo "releaseCommit=${release_commit}"

          if [[ -n "${EXPECTED_RELEASE_VERSION}" && "${release_version}" != "${EXPECTED_RELEASE_VERSION}" ]]; then
            echo "releaseVersion matcher ikke expected_release_version (${EXPECTED_RELEASE_VERSION})." >&2
            exit 1
          fi
