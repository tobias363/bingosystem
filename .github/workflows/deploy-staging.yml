name: Deploy Staging

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.head_repository.full_name == github.repository) }}

    steps:
      - name: Trigger Render staging deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}
          RENDER_HEALTHCHECK_URL: ${{ secrets.RENDER_STAGING_HEALTHCHECK_URL }}
          RENDER_DEPLOY_WAIT_TIMEOUT_SECONDS: ${{ vars.RENDER_STAGING_WAIT_TIMEOUT_SECONDS || '600' }}
          RENDER_DEPLOY_POLL_INTERVAL_SECONDS: ${{ vars.RENDER_STAGING_POLL_INTERVAL_SECONDS || '10' }}
          RENDER_DEPLOY_CURL_RETRIES: ${{ vars.RENDER_STAGING_CURL_RETRIES || '3' }}
        run: |
          set -euo pipefail

          if [[ -z "${RENDER_DEPLOY_HOOK_URL}" ]]; then
            echo "RENDER_STAGING_DEPLOY_HOOK_URL mangler i GitHub Secrets." >&2
            exit 1
          fi
          if [[ -z "${RENDER_HEALTHCHECK_URL}" ]]; then
            echo "RENDER_STAGING_HEALTHCHECK_URL mangler i GitHub Secrets." >&2
            exit 1
          fi

          echo "Trigger staging deploy hook ..."
          curl -fsS \
            --retry "${RENDER_DEPLOY_CURL_RETRIES}" \
            --retry-all-errors \
            --connect-timeout 10 \
            -X POST \
            "${RENDER_DEPLOY_HOOK_URL}" >/dev/null

          echo "Venter på healthcheck: ${RENDER_HEALTHCHECK_URL}"
          start_ts="$(date +%s)"

          while true; do
            if curl -fsS "${RENDER_HEALTHCHECK_URL}" >/dev/null; then
              echo "Staging healthcheck OK."
              break
            fi

            now_ts="$(date +%s)"
            elapsed="$((now_ts - start_ts))"
            if (( elapsed >= RENDER_DEPLOY_WAIT_TIMEOUT_SECONDS )); then
              echo "Timeout etter ${RENDER_DEPLOY_WAIT_TIMEOUT_SECONDS}s uten grønn staging healthcheck." >&2
              exit 1
            fi

            sleep "${RENDER_DEPLOY_POLL_INTERVAL_SECONDS}"
          done
