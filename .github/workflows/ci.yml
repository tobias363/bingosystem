name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install apps/backend dependencies
        run: npm --prefix apps/backend ci

      - name: Type check apps/backend
        run: npm --prefix apps/backend run check

      - name: Run apps/backend tests
        run: npm --prefix apps/backend run test

      - name: Run compliance suite
        run: npm --prefix apps/backend run test:compliance

      - name: Build apps/backend
        run: npm --prefix apps/backend run build
