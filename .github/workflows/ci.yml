name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Type check backend
        run: npm --prefix backend run check

      - name: Run backend tests
        run: npm --prefix backend run test

      - name: Run compliance suite
        run: npm --prefix backend run test:compliance

      - name: Run RTP / near-miss gate
        run: npm --prefix backend run check:rtp-near-miss

      - name: Build backend
        run: npm --prefix backend run build
