name: Unity WebGL build (BIN-532)

# Reproducible Unity WebGL build of legacy/unity-client/. Produces a
# deployable artefact we can drop into production within minutes if the
# pilot needs to roll back to the legacy client (BIN-540 `unity-fallback`
# flag). Runs on demand, on tags, and weekly on a schedule so the build
# pipeline never gets stale.
#
# Why containerised: the game-ci/unity-builder action pulls a fixed Unity
# 6000.3.10f1 base image, so the bundle is byte-reproducible across runners.
# That's the reproducibility guarantee this workflow makes good on.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build from (default: main)"
        required: false
        default: "main"
  push:
    tags:
      # Allow an explicit unity-build tag to cut a bundle off any commit.
      - "unity-build-*"
      # Release tags also trigger a Unity build so every production cut
      # has a matching rollback bundle.
      - "v*"
  schedule:
    # Weekly sanity build — proves the Unity toolchain still works even
    # when nobody's been touching legacy/unity-client/ for a while.
    - cron: "0 3 * * 1"

concurrency:
  group: unity-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-webgl:
    name: Build WebGL from legacy/unity-client
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Pinned to match legacy/unity-client/ProjectSettings/ProjectVersion.txt.
      # When Unity is bumped in the project, update this line in the same PR.
      UNITY_VERSION: "6000.3.10f1"
      PROJECT_PATH: "legacy/unity-client"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          # LFS stores the heavy textures / audio; without it the build
          # picks up placeholder text files and silently produces a
          # broken bundle.
          lfs: true

      - name: Verify Unity version pin
        # Fail fast if ProjectVersion.txt has drifted from UNITY_VERSION.
        # Prevents a silent "we built 6000.3.10f1 but the repo says
        # 6000.4.1f1" mismatch that's painful to diagnose later.
        run: |
          FILE_VERSION=$(grep -E '^m_EditorVersion:' "$PROJECT_PATH/ProjectSettings/ProjectVersion.txt" | awk '{print $2}')
          echo "ProjectVersion.txt → $FILE_VERSION"
          echo "workflow UNITY_VERSION → $UNITY_VERSION"
          if [ "$FILE_VERSION" != "$UNITY_VERSION" ]; then
            echo "::error::Unity version mismatch: ProjectVersion.txt=$FILE_VERSION but workflow expects $UNITY_VERSION"
            exit 1
          fi

      # game-ci/cache@v4 caches the Unity Library/ directory keyed by the
      # content of ProjectSettings/. First build is slow (~25 min), next
      # ones are ~5 min when the cache hits.
      - name: Restore Unity Library cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: unity-lib-${{ env.UNITY_VERSION }}-WebGL-${{ hashFiles(format('{0}/ProjectSettings/**', env.PROJECT_PATH)) }}
          restore-keys: |
            unity-lib-${{ env.UNITY_VERSION }}-WebGL-
            unity-lib-${{ env.UNITY_VERSION }}-

      - name: Build WebGL bundle
        # game-ci/unity-builder@v4 is the GameCI community-standard action.
        # It pulls an official unityci/editor:<ver>-webgl-<rev> container,
        # activates the license, runs BuildTarget=WebGL, and drops the
        # output in `build/WebGL/` by default.
        uses: game-ci/unity-builder@v4
        env:
          # Activation — three forms supported by GameCI:
          #   Personal:  UNITY_LICENSE (ulf file contents)
          #   Serial:    UNITY_SERIAL + UNITY_EMAIL + UNITY_PASSWORD (Pro)
          #   Pro seat:  UNITY_LICENSE (ulf obtained via Pro flow)
          # For the pilot this workflow expects UNITY_LICENSE to be set as
          # the repo secret; fail fast when it's missing so a misconfigured
          # run can't produce a useless unsigned build.
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          projectPath: ${{ env.PROJECT_PATH }}
          targetPlatform: WebGL
          # Match the existing Unity build script name if legacy has one;
          # omitted `buildMethod` falls back to Unity's default WebGL build.
          buildName: spillorama-unity-webgl
          # Headless-safe: never pop up a license dialog.
          allowDirtyBuild: true
          # Emit the exit code non-zero on build errors so the workflow fails.
          versioning: None

      - name: Record build metadata
        # Stamp every artefact with the commit SHA + run ID + UNITY_VERSION
        # so operators can trace a deployed bundle back to an exact build run.
        run: |
          META_FILE="build/WebGL/BUILD_METADATA.txt"
          mkdir -p "$(dirname "$META_FILE")"
          {
            echo "unityVersion=$UNITY_VERSION"
            echo "commitSha=${{ github.sha }}"
            echo "ref=${{ github.ref }}"
            echo "runId=${{ github.run_id }}"
            echo "runUrl=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "builtAt=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "$META_FILE"
          cat "$META_FILE"

      - name: Upload Unity WebGL bundle
        uses: actions/upload-artifact@v4
        with:
          name: spillorama-unity-webgl-${{ github.sha }}
          path: build/WebGL/
          retention-days: 90
          # If the build fails this step won't run — we never publish a
          # half-baked artefact.

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unity-build-log-${{ github.sha }}
          path: build/editor.log
          retention-days: 14
          if-no-files-found: ignore

      - name: Post-run summary
        if: always()
        run: |
          {
            echo "## Unity WebGL build"
            echo ""
            echo "- Unity version: \`$UNITY_VERSION\`"
            echo "- Project path: \`$PROJECT_PATH\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Ref: \`${{ github.ref }}\`"
            if [ -f build/WebGL/BUILD_METADATA.txt ]; then
              echo ""
              echo "### BUILD_METADATA.txt"
              echo '```'
              cat build/WebGL/BUILD_METADATA.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
