{% extends "partition/layout.html" %} {% block body %}


<!-- Main Content -->
<div class="page-wrapper">
    <div class="container-fluid">

        <!-- Title -->
        <section class="content-header">
            <h1>{{WalletData.view_wallet}}</h1>
            <ol class="breadcrumb">
                <li><a href="/dashboard"><i class="fa fa-dashboard"></i> {{WalletData.dashboard}}</a></li>
                <li class="active">{{WalletData.view_wallet}}</li>
            </ol>
        </section>
        <!-- /Title -->
        {% include "partition/notification.html" %}
        <section class="content">
            <!-- Row -->
            <div class="row">
                <div class="col-sm-12">
                    <div class="panel panel-default card-view">
                        <div class="panel-heading">
                            <div class="pull-left">
                                <h6 class="panel-title txt-dark">{{WalletData.view_wallet}}</h6>
                            </div>
                            <div class="clearfix"></div>
                        </div>
                        <div class="panel-wrapper collapse in">
                            <div class="panel-body">
                                <div class="table-wrap">
                                    <div class="table-responsive">
                                        <form method="POST" action="#" name="addHall" class="form-horizontal">
                                            <table border="0" class="table display  pb-30">
                                                <div class="col-sm-8">
                                                    <div class="panel-wrapper collapse in">
                                                        <div class="panel-body">
                                                            <div class="form-group">
                                                                <label class="control-label mb-10 col-sm-2" for="username">{{WalletData.username}}:</label>
                                                                <div class="col-sm-10">

                                                                    <input type="text" class="form-control" {{ "readonly disabled" if Wallet else "" }} required name="username" id="usernmae" value="{{Wallet.username}}">
                                                                </div>
                                                            </div>

                                                            <div class="form-group">
                                                                <label class="control-label mb-10 col-sm-2" for="email">{{WalletData.emailId}}:</label>
                                                                <div class="col-sm-10">

                                                                    <input type="text" class="form-control" {{ "readonly disabled" if Wallet else "" }} required name="email" id="email" value="{{Wallet.email}}">
                                                                </div>
                                                            </div>
                                                            <div class="form-group">
                                                                <label class="control-label mb-10 col-sm-2" for="mobile">{{WalletData.mobile_number}}:</label>
                                                                <div class="col-sm-10">

                                                                    <input type="text" class="form-control" {{ "readonly disabled" if Wallet else "" }} required name="mobile" id="mobile" value="{{Wallet.phone}}">
                                                                </div>
                                                            </div>
                                                            <div class="form-group">
                                                                <label class="control-label mb-10 col-sm-2" for="nickname">{{WalletData.firstname}}:</label>
                                                                <div class="col-sm-10">

                                                                    <input type="text" class="form-control" {{ "readonly disabled" if Wallet else "" }} required name="nickname" id="nickname" value="{{Wallet.nickname}}">
                                                                </div>
                                                            </div>
                                                            <!-- <div class="form-group">
                                                                <label class="control-label mb-10 col-sm-2" for="pointsAmt">Points Amount:</label>
                                                                <div class="col-sm-10">
                                                                    <input type="text" class="form-control" {{ "readonly disabled" if Wallet else "" }} required name="pointsAmount" id="pointsAmt" value="{{(Wallet.points | float).toFixed(3)}}">
                                                                </div>
                                                            </div> -->
                                                            <div class="form-group">
                                                                <label class="control-label mb-10 col-sm-2" for="walletAmt">{{WalletData.wallet_amount}}:</label>
                                                                <div class="col-sm-10">
                                                                    <input type="text" class="form-control" {{ "readonly disabled" if Wallet else "" }} required name="walletAmount" id="walletAmt" value="{{(Wallet.walletAmount | float).toFixed(3)}}">
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>

                                                <tr>
                                                    <td colspan="2">
                                                        <div class="pull-left">
                                                            <a href="/wallet" class="btn btn-danger btn-flat">Cancel</a>
                                                        </div>
                                                    </td>
                                                </tr>
                                            </table>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </section>
        <!-- /Row -->
    </div>
</div>

{% endblock %} {% block Jscript %}
<script src="https://cdn.rawgit.com/harvesthq/chosen/gh-pages/chosen.jquery.min.js"></script>
<link href="https://cdn.rawgit.com/harvesthq/chosen/gh-pages/chosen.min.css" rel="stylesheet" /> {% endblock %}
