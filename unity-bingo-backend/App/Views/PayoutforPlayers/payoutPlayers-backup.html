{% extends "partition/layout.html" %} {% block body %}

<!-- Main Content -->
<div class="page-wrapper">
    <div class="container-fluid">
        <div class="content-header">
            <h1>Payout Management</h1>
            <div class="choose-game">
                <label>Choose a Game:-</label>
                <select id="games" name="gamesList">
                    <option value="">Choose Game Type</option>
                    {% for item in DataOfGames %}
                    <option value="{{item._id}}">{{item.name}}</option>
                    {% endfor %}
                    </select>
            </div>
        </div>

        <!-- Title -->
        <section class="content-header" id="gameHeader">
        </section>
        <!-- /Title -->
        {% include "partition/notification.html" %}
        <!-- Ticket List Modal -->
        <div class="modal fade" id="ticketListModal" aria-labelledby="ticketListModalTitle"
            aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 class="modal-title" id="ticketListModalLongTitle">Ticket Purchased</h3>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <div class="modal-body">
                       <div id="ticketList" class="row" style="padding: 5px;"></div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Row -->
        <section class="content" id="allGameDetails">
            <div class="row">
                <div class="col-sm-12">
                    <div class="panel panel-default card-view">
                        <div class="panel-heading" id="addGameID">
                        </div>
                        <div class="panel-wrapper collapse in">
                            <div class="panel-body">
                                <div class="table-wrap">
                                    <div class="table-responsive">

                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div id="profitLoss">

        </div>

    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    $(document).ready(function() {

        $('#ticketListModal').on('hidden.bs.modal', function () {

        // clear for internal content
        $("#gameHeader").empty();

        $("#myTable").empty();
        $(".table-responsive").empty();
        $("#profitLoss").empty();
        $("#gameHeader").hide();
        $("#allGameDetails").hide();

        //Dropdown Wise Game Details Changes
        $("#games").change(function() {

            // clear for internal content
            $("#gameHeader").empty();
            $("#addGameID").empty();
            $("#myTable").empty();
            $("#profitLoss").empty();
            $(".table-responsive").empty();
            $("#gameHeader").hide();
            $("#allGameDetails").hide();

            // Game ID Select
            var selectedValue = $("#games option:selected").val();
            //console.log("option", selectedValue);

            // if any pervious key store so localStorage do Clear this  key
            localStorage.removeItem("selectedId");
            localStorage.clear();

            //localStorage Set
            localStorage.setItem("selectedId", selectedValue);

            if (selectedValue == "") { // if selectedValue is Blank
                // clear for internal content
                $("#gameHeader").empty();
                $("#addGameID").empty();
                $("#myTable").empty();
                $("#profitLoss").empty();
                $(".table-responsive").empty();
                $("#gameHeader").hide();
                $("#allGameDetails").hide();
            } else {
                gameDetailsGet(selectedValue);
            }
        }).val(function() {
            //Previous Value get
            var id = localStorage.getItem("selectedId");
            //console.log("id", id);
            if (id === null) {
                $("#gameHeader").hide();
                $("#allGameDetails").hide();

                // clear for internal content
                $("#gameHeader").empty();
                $("#addGameID").empty();
                $("#myTable").empty();
                $("#profitLoss").empty();
                $(".table-responsive").empty();
                $("#gameHeader").hide();
                $("#allGameDetails").hide();

            } else {
                gameDetailsGet(id);
            }

            return localStorage.getItem("selectedId");
        });
