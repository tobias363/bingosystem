<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spill 1 — Visual Regression Harness</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0f0f1a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      height: 100%;
      overflow: hidden;
    }
    body { width: 100vw; height: 100vh; }

    /*
     * The harness always fills the viewport so that snapshot sizes line up
     * with Playwright's viewport setting (1920×1080 for TV, 1280×720 for
     * agent-portal). Individual scenarios render into #game-container.
     */
    #game-container {
      width: 100vw;
      height: 100vh;
      background: #1a1a2e;
      position: relative;
      overflow: hidden;
    }

    #readiness-beacon {
      position: fixed;
      bottom: 4px;
      right: 4px;
      width: 6px;
      height: 6px;
      background: #444;
      border-radius: 50%;
      z-index: 10000;
      pointer-events: none;
    }
    #readiness-beacon[data-ready="true"] { background: #0f0; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <!--
    Tiny beacon Playwright polls for readiness. The harness flips data-ready
    to "true" once the requested scenario has mounted and fully settled
    (assets loaded, tweens idle). Playwright waits for [data-ready="true"]
    before taking any screenshot to avoid race-capturing first-paint.
  -->
  <div id="readiness-beacon" data-ready="false"></div>
  <script type="module" src="./visual-harness.ts"></script>
</body>
</html>
