<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spillorama — Game Client (Dev)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #fff; }

    /* ── Lobby ── */
    #dev-lobby {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; gap: 24px; padding: 40px 20px;
    }
    #dev-lobby.hidden { display: none; }
    #dev-lobby h1 { font-size: 28px; color: #ffe83d; letter-spacing: 2px; }
    #dev-lobby p.sub { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: -12px; }

    .lobby-card {
      background: linear-gradient(180deg, #3a0a0a 0%, #1a0000 100%);
      border: 2px solid #790001; border-radius: 14px;
      padding: 24px 28px; width: 100%; max-width: 420px;
    }
    .lobby-card h2 { font-size: 16px; color: #ffe83d; margin-bottom: 16px; }
    .lobby-card label { font-size: 12px; text-transform: uppercase; color: rgba(255,255,255,0.5); display: block; margin-bottom: 4px; }
    .lobby-card input, .lobby-card select {
      width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.4); color: #fff; font-size: 15px; margin-bottom: 14px; font-family: inherit;
    }
    .lobby-card input::placeholder { color: rgba(255,255,255,0.3); }
    .lobby-card select option { background: #1a0000; }

    .btn-primary {
      width: 100%; padding: 12px; border-radius: 10px; border: none;
      background: linear-gradient(180deg, #c41030 0%, #8a0020 100%);
      color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }

    .error-msg { color: #ff6b6b; font-size: 13px; text-align: center; min-height: 18px; margin-bottom: 8px; }
    .user-info { color: rgba(255,255,255,0.6); font-size: 13px; text-align: center; }
    .user-info strong { color: #81c784; }

    /* ── Game cards ── */
    .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 420px; }
    .game-card {
      background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.1); border-radius: 12px;
      padding: 20px 12px; text-align: center; cursor: pointer; transition: all 0.15s;
    }
    .game-card:hover { border-color: #ffe83d; background: rgba(255,232,61,0.08); transform: scale(1.03); }
    .game-card .emoji { font-size: 36px; margin-bottom: 8px; }
    .game-card .name { font-size: 14px; font-weight: 600; }
    .game-card .slug { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px; }

    /* ── Game container ── */
    #game-container { width: 100vw; height: 100vh; }
    #game-container.hidden { display: none; }

    /* ── Back button ── */
    #back-btn {
      position: fixed; top: 12px; left: 12px; z-index: 9999;
      background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px; padding: 6px 14px; color: #fff; font-size: 13px;
      cursor: pointer; font-family: inherit; display: none;
    }
    #back-btn:hover { background: rgba(0,0,0,0.9); }
  </style>
</head>
<body>

  <!-- Dev Lobby -->
  <div id="dev-lobby">
    <h1>SPILLORAMA</h1>
    <p class="sub">Web-native dev lobby</p>

    <!-- Login -->
    <div class="lobby-card" id="login-card">
      <h2>Logg inn</h2>
      <label>E-post</label>
      <input type="email" id="login-email" placeholder="test@test.no" />
      <label>Passord</label>
      <input type="password" id="login-password" placeholder="••••••••••••" />
      <label>Hall</label>
      <select id="login-hall"><option value="">Laster haller...</option></select>
      <div class="error-msg" id="login-error"></div>
      <button class="btn-primary" id="login-btn">Logg inn</button>
      <div class="user-info" id="login-info"></div>
    </div>

    <!-- Game selection (shown after login) -->
    <div class="game-grid" id="game-grid" style="display:none;">
      <div class="game-card" data-game="game_1">
        <div class="emoji">🎱</div>
        <div class="name">Classic Bingo</div>
        <div class="slug">game_1</div>
      </div>
      <div class="game-card" data-game="game_2">
        <div class="emoji">🔢</div>
        <div class="name">Tallspill</div>
        <div class="slug">game_2</div>
      </div>
      <div class="game-card" data-game="game_3">
        <div class="emoji">👾</div>
        <div class="name">Mønsterbingo</div>
        <div class="slug">game_3</div>
      </div>
    </div>
  </div>

  <!-- Game -->
  <div id="game-container" class="hidden"></div>
  <button id="back-btn">← Tilbake til lobby</button>

  <script type="module" src="/src/main.ts"></script>
  <script type="module">
    const API = "http://localhost:4000";
    let accessToken = null;
    let selectedHall = null;

    // ── Load halls ──
    async function loadHalls() {
      try {
        // Halls need auth, but we can try the public endpoint or use a workaround
        // For now, hardcode known halls from the database
        const select = document.getElementById("login-hall");
        const halls = [
          { slug: "notodden", name: "Notodden" },
          { slug: "harstad", name: "Harstad" },
          { slug: "sortland", name: "Sortland" },
          { slug: "bodo", name: "Bodø" },
          { slug: "skien", name: "Skien" },
          { slug: "stathelle", name: "Stathelle" },
          { slug: "larvik", name: "Larvik" },
          { slug: "kragero", name: "Kragerø" },
          { slug: "heimdal", name: "Heimdal" },
          { slug: "lillehammer", name: "Lillehammer" },
          { slug: "hamar", name: "Hamar" },
          { slug: "hokksund", name: "Hokksund" },
        ];
        select.innerHTML = halls.map(h =>
          `<option value="${h.slug}">${h.name}</option>`
        ).join("");
      } catch (e) {
        console.error("Failed to load halls:", e);
      }
    }
    loadHalls();

    // ── Restore session ──
    const saved = localStorage.getItem("spillorama-dev-session");
    if (saved) {
      try {
        const session = JSON.parse(saved);
        accessToken = session.accessToken;
        selectedHall = session.hall;
        document.getElementById("login-info").innerHTML =
          `Innlogget som <strong>${session.displayName}</strong> (${session.email})`;
        document.getElementById("login-email").value = session.email;
        document.getElementById("login-hall").value = session.hall;
        showGameGrid();
      } catch {}
    }

    // ── Login ──
    document.getElementById("login-btn").addEventListener("click", async () => {
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;
      const hall = document.getElementById("login-hall").value;
      const errorEl = document.getElementById("login-error");
      const btn = document.getElementById("login-btn");

      if (!email || !password) { errorEl.textContent = "Fyll inn e-post og passord"; return; }

      btn.disabled = true;
      btn.textContent = "Logger inn...";
      errorEl.textContent = "";

      try {
        const res = await fetch(`${API}/api/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!data.ok) {
          errorEl.textContent = data.error?.message || "Innlogging feilet";
          btn.disabled = false;
          btn.textContent = "Logg inn";
          return;
        }

        accessToken = data.data.accessToken;
        selectedHall = hall;

        localStorage.setItem("spillorama-dev-session", JSON.stringify({
          accessToken, hall, email,
          displayName: data.data.user.displayName,
        }));

        document.getElementById("login-info").innerHTML =
          `Innlogget som <strong>${data.data.user.displayName}</strong> — saldo: ${data.data.user.balance} kr`;

        showGameGrid();
      } catch (e) {
        errorEl.textContent = "Nettverksfeil: " + e.message;
      }
      btn.disabled = false;
      btn.textContent = "Logg inn";
    });

    function showGameGrid() {
      document.getElementById("game-grid").style.display = "grid";
    }

    // ── Game selection ──
    document.querySelectorAll(".game-card").forEach(card => {
      card.addEventListener("click", () => {
        if (!accessToken) { alert("Logg inn først"); return; }
        const gameSlug = card.dataset.game;
        launchGame(gameSlug);
      });
    });

    async function launchGame(gameSlug) {
      const lobby = document.getElementById("dev-lobby");
      const container = document.getElementById("game-container");
      const backBtn = document.getElementById("back-btn");

      lobby.classList.add("hidden");
      container.classList.remove("hidden");
      backBtn.style.display = "block";

      const client = window.__spilloramaGameClient;
      if (client?.mountGame) {
        await client.mountGame(container, {
          gameSlug,
          accessToken,
          hallId: selectedHall,
          serverUrl: API,
        });
      } else {
        console.error("Game client not loaded");
      }
    }

    // ── Back button ──
    document.getElementById("back-btn").addEventListener("click", () => {
      const client = window.__spilloramaGameClient;
      if (client?.unmountGame) client.unmountGame();

      document.getElementById("game-container").classList.add("hidden");
      document.getElementById("game-container").innerHTML = "";
      document.getElementById("dev-lobby").classList.remove("hidden");
      document.getElementById("back-btn").style.display = "none";
    });

    // ── Auto-launch from URL param ──
    const params = new URLSearchParams(window.location.search);
    const autoGame = params.get("game");
    if (autoGame && accessToken) {
      const slugMap = { bingo: "game_1", rocket: "game_2", monster: "game_3" };
      const slug = slugMap[autoGame] || autoGame;
      // Small delay to let main.ts register games
      setTimeout(() => launchGame(slug), 500);
    }
  </script>
</body>
</html>
