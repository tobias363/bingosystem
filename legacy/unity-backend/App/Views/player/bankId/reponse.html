<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bank Id Verification</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" />
    <style>
        /* Base Styles */
        body {
            background: #812222;
            margin: 0;
            padding: 0;
        }

        .center-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Full height of the viewport */
        }

        .payment {
            width: 100%; /* Ensure the payment box respects the column size */
            max-width: 500px; /* Default max-width */
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            background: #fff;
            border-radius: 8px;
            margin: 0 auto; /* Center the payment box */
        }

        .payment_header {
            text-align: center;
            padding: 20px;
            border-radius: 20px 20px 0 0;
            background: rgba(98, 190, 79, 255);
        }

        .payment_header.orange {
            background: rgba(255, 102, 0, 1);
        }

        .check {
            margin: 0 auto;
            width: 50px;
            height: 50px;
            border-radius: 100%;
            background: #fff;
            text-align: center;
        }

        .check i {
            line-height: 50px;
            font-size: 30px;
            color: #62be4f;
        }

        .check.times i {
            color: rgba(255, 102, 0, 1);
        }

        .content {
            text-align: center;
            padding: 25px;
            align-items: center;
            justify-content: center;
        }

        .content h1 {
            font-size: 25px;
            padding-top: 20px;
        }

        .content a {
            display: flex; /* Use flexbox for centering */
            justify-content: center; /* Center horizontally */
            align-items: center; /* Center vertically */
            width: 100%; /* Optional: if you want the button to be full-width */
            font-size: 14px;
            padding: 12px;
            color: #fff;
            border-radius: 30px;
            background: rgba(98, 190, 79, 255);
            transition: all 0.3s ease-in-out;
            text-decoration: none;
            text-align: center; /* Ensure text is centered */
        }

        .content a.orange {
            background: rgba(255, 102, 0, 1);
        }

        .content a:hover {
            text-decoration: none;
            background: #812222;
        }

        /* Media Queries */

        /* iPad Pro (1024x1366) - Specific to iPad Pro only */
        @media only screen and (min-width: 1024px) and (max-width: 1366px) and (min-height: 1024px) and (max-height: 1366px) {
            .col-lg-6 {
                max-width: 100% !important; /* Allow the column to take full width */
                flex: 0 0 100% !important; /* Override Bootstrap's flex behavior */
            }

            .payment {
                max-width: 800px !important; /* Set the payment box width */
                padding: 30px;
            }

            .payment_header {
                padding: 30px; /* Increase header padding */
            }

            .check {
                width: 70px; /* Increase check icon size */
                height: 70px;
            }

            .check i {
                font-size: 40px; /* Increase icon size */
                line-height: 70px; /* Adjust line height for centering */
            }

            .content h1 {
                font-size: 32px; /* Increase heading size */
            }

            .content p {
                font-size: 18px; /* Increase paragraph text size */
            }

            .content a {
                font-size: 18px; /* Increase button text size */
                padding: 15px; /* Increase button padding */
            }
        }

        /* Tablets (768px and below) */
        @media (max-width: 768px) {
            .content h1 {
                font-size: 20px;
            }

            .content a {
                font-size: 14px;
                padding: 10px; /* Adjust padding for smaller screens */
            }
        }

        /* Small Devices (576px and below) */
        @media (max-width: 576px) {
            .payment {
                border-radius: 15px;
            }

            .payment_header {
                padding: 15px;
            }

            .check {
                width: 40px;
                height: 40px;
            }

            .check i {
                font-size: 24px;
                line-height: 40px;
            }

            .content a {
                font-size: 12px;
                padding: 8px; /* Further adjust padding for even smaller screens */
            }
        }

        /* Extra Small Devices (360px and below) */
        @media (max-width: 360px) {
            .payment {
                max-width: 90%; /* Make it take 90% of the screen width */
                padding: 10px; /* Reduce padding for a better fit */
            }

            .payment_header {
                padding: 10px; /* Reduce header padding */
            }

            .content h1 {
                font-size: 16px; /* Reduce the heading size for smaller screens */
            }

            .content p {
                font-size: 12px; /* Adjust paragraph text size */
            }

            .content a {
                font-size: 12px; /* Reduce button text size */
                padding: 8px; /* Adjust button padding for smaller devices */
            }

            .check {
                width: 30px; /* Reduce the size of the check icon container */
                height: 30px;
            }

            .check i {
                font-size: 20px; /* Scale down the icon size */
                line-height: 30px; /* Center-align the icon */
            }
        }
        @media only screen and (orientation: landscape) and (max-width: 850px) and (max-height: 500px) {
            .center-container {
                transform: scale(0.8);
            }
        }
    </style>
</head>
<body>
    <div class="container-fluid center-container">
        <div class="row justify-content-center w-100">
            <div class="col-lg-6">
                <div class="payment">
                    <div class="payment_header {% if status != 'Completed' and status != 'Pending' %}orange{% endif %}">
                        <div class="check {% if status != 'Completed' and status != 'Pending' %}times{% endif %}">
                            <i class="fa {% if status == 'Completed' or status == 'Pending' %}fa-check{% else %}fa-exclamation{% endif %}" aria-hidden="true"></i>
                        </div>
                    </div>
                    <div class="content text-center">
                        <h1>{{ title }}</h1>
                        <p>{{ message }}</p>
                        {% if isDisplayGoBackBtn %}
                            <a href="#" class="btn btn-primary gotoApp {% if status != 'Completed' and status != 'Pending' %}orange{% endif %}">{{ goBack }}</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/vendors/bower_components/jquery/dist/jquery.min.js"></script>
    <script>
        $(document).ready(function () {
            const deeplink = "unitydl://Spilloramalink?closePaymentPage";
            const isOldPage = !!sessionStorage.getItem('tabId');
            const host = window.location.origin;
            let isDisplayGoBackBtn = "{{isDisplayGoBackBtn}}"
    
            // Set deeplink for new pages
            if (!isOldPage) {
                $('.gotoApp').attr('href', deeplink);
            }

            // Function to get URL parameters
            function getUrlParameter(name) {
                name = name.replace(/[\[\]]/g, '\\$&');
                const regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)');
                const results = regex.exec(window.location.href);
                if (!results) return null;
                if (!results[2]) return '';
                return decodeURIComponent(results[2].replace(/\+/g, ' '));
            }

            // Function to handle go back logic
            function goBack(isClick = false) {
                //if (isOldPage) {
                    const id = getUrlParameter('id');
                    const refId = getUrlParameter('refId');
                    console.log("id--", id);
                    if (id) {
                        $.ajax({
                            type: 'POST',
                            url: `${host}/player/bankid/goback`,
                            data: { id: id, refId: refId },
                            success: function (resultData) {
                                console.log("Go back response:", resultData);
                            }
                        });
                    }
                //} else if (!isClick) {
                    //window.location.href = deeplink;
                //}
            }

            // Automatically trigger go back after 10 seconds
            if(isDisplayGoBackBtn == "true"){
                setTimeout(() => goBack(), 10000);
            }
                
            // Handle manual click on the go back button
            $(".gotoApp").click(function (e) {
                e.preventDefault();
                goBack(true);
            });
        });
    </script>
</body>
</html>
