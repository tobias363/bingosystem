<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deposit Payment - Swedbank Pay</title>
  <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
  <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" />
  <style>
     body { background: #812222; }
    .spinner-container { display: flex; justify-content: center; align-items: center; height: 80vh; }
    .spinner {
      border: 8px solid #f3f3f3;
      border-top: 8px solid #812222;
      border-radius: 50%;
      width: 70px;
      height: 70px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    #payex-checkout { min-height: 600px; width: 100%; }

    .payment { border: 1px solid #f2f2f2; height: 330px; border-radius: 20px; background: #fff; }
    .payment_header { background: rgba(98,190,79,255); padding: 20px; border-radius: 20px 20px 0px 0px; }
    .check { margin: 0px auto; width: 50px; height: 50px; border-radius: 100%; background: #fff; text-align: center; }
    .check i { vertical-align: middle; line-height: 50px; font-size: 30px; color: #62be4f}
    .content { text-align: center; padding: 25px;}
    .content  h1 { font-size: 25px; padding-top: 20px; }
    .content a { width: 200px; height: 35px; color: #fff; border-radius: 30px; padding: 5px 10px; background: rgba(98,190,79,255); transition: all ease-in-out 0.3s; }
    .content a:hover { text-decoration: none; background: #812222; }
    
    .times i {color: rgba(255, 102, 0, 1)}
    .orange { background: rgba(255, 102, 0, 1); }
    .content .orange {background: rgba(255, 102, 0, 1);}
    .center-container {
      margin-top: 5px;
      min-height: 100vh; /* Full viewport height */
      display: flex; /* Use flexbox */
      justify-content: center; /* Center horizontally */
      align-items: center; /* Center vertically */
    }
    @media screen and (max-device-width: 991px) and (orientation: landscape) {
      .payment-reponse .center-container {
        transform: scale(0.9);
      }
    } 

  </style>
</head>
<body>
<div class="container center-container">

{% if (status == "pending") %}
    <!-- Spinner while loading -->
    <div class="spinner-container" id="spinner-wrapper">
        <div class="spinner"></div>
    </div>

    <!-- Container where Seamless Checkout will render -->
    <div id="payex-checkout" style="display:none;"></div>

    <script>
        function generateTabId() {
          return Math.random().toString(36).substring(2);
        }
        console.log("sessionStorage in payment page", sessionStorage.getItem('tabId'));
        if (!sessionStorage.getItem('tabId')) {
          sessionStorage.setItem('tabId', generateTabId());
        }
        console.log("sessionStorage in payment page after set", sessionStorage.getItem('tabId'));

        (function() {
          const checkoutUrl = "{{url}}";  // must be the "view-checkout" URL
          console.log("checkoutUrl", checkoutUrl)
          if (!checkoutUrl) {
              console.error("No checkout URL provided");
              return;
          }

          const spinner = document.getElementById("spinner-wrapper");
          const checkoutContainer = document.getElementById("payex-checkout");

          const script = document.createElement("script");
          script.src = checkoutUrl;
          script.type = "text/javascript";
          script.id = "payex-checkout-script";
          script.onload = function () {
              console.log("script loaded")
          
              spinner.style.display = "none";
              checkoutContainer.style.display = "block";
              // Initialize checkout
              payex.hostedView.checkout({ 
                  container: {
                      checkout: "payex-checkout"
                  },
                  culture: "{{culture}}",
                  onError: function (data) {
                      console.error("Swedbank Pay error", data);
                  },
                  onEventNotification: function (data) {
                      console.log("Swedbank Pay event", data);
                      // Fallback: hide spinner on *any* event if iframe appears
                      if (document.querySelector("#payex-checkout iframe")) {
                          spinner.style.display = "none";
                          checkoutContainer.style.display = "block";
                      }

                      // Detect Terms of Service click
                      if (data && data.sourceEvent === "OnTermsOfServiceRequested") {
                        // Smooth scroll page to top
                        window.scrollTo({ top: 0, behavior: "smooth" });
                        return;
                      }
                  }
              }).open();
          };
          document.body.appendChild(script);
        })();
    </script>
{% else %}
    <!-- Success or Failed -->
    <div class="row">
      <div class="col-md-10 mx-auto">
        <div class="payment">
          {% if (status == "success") %}
          <div class="payment_header">
            <div class="check"><i class="fa fa-check" aria-hidden="true"></i></div>
          {% else %}
            <div class="payment_header orange">
              <div class="check times"><i class="fa fa-exclamation" aria-hidden="true"></i></div>
          {% endif %}
        </div>

        <div class="content">
          <h1>{{title}}</h1>
          <p> {{message}} </p>
          
          {% if (status == "success") %}
            <a href="#" class="btn btn-primary gotoApp">{{goBack}}</a>
          {% else %}
            <a href="#" class="btn btn-primary gotoApp orange">{{goBack}}</a>
          {% endif %}
        </div>
      </div>
    </div>
	</div>
  <script src="/vendors/bower_components/jquery/dist/jquery.min.js"></script>
  <script>
    document.body.classList.add("payment-reponse");
    function goBack() {
      const id = window.location.pathname.split("/").pop();
      $.post(window.location.origin + "/payment/goback", { id })
        .done(result => console.log("Go back response:", result));
    }
    setTimeout(goBack, 10000);
    $(".gotoApp").on("click", function(e) { e.preventDefault(); goBack(); });
  </script>
{% endif %}
</div>
</body>
</html>
