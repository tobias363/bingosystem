<style>
    .wrapperSelected {
        height: 28px !important;
        border: 1px solid #ABADB3;
        margin: 0;
        padding: 4px 0 0 0;
        font-size: 14px;
    }
    .btn-group-new>.btn,
    .btn-new {
        padding: 2px 83px;
        font-size: 12px;
        line-height: 1.5;
        border-radius: 3px
    }

    /* Toggle Switch Styles for Bootstrap 3.3 */
    .aligned-actions {
        display: flex;
        align-items: center; /* vertically center items */
        gap: 5px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .toggle-switch-container {
        display: flex;
        align-items: center;
        height: 17px;
    }
    
    .switch {
        position: relative;
        display: inline-block;
        width: 25px;
        height: 14px;
    }

    .switch input {
        opacity: 0;
        width: 0;
        height: 0;
    }

    .slider {
        position: absolute;
        cursor: pointer;
        background-color: #ccc;
        transition: 0.4s;
        border-radius: 34px;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
    }

    .slider:before {
        position: absolute;
        content: "";
        height: 10px;
        width: 10px;
        left: 2px;
        bottom: 2px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
    }

    input:checked + .slider {
        background-color: #2196F3;
    }

    input:checked + .slider:before {
        transform: translateX(11px); /* 25 - 10 - padding = ~11px */
    }

</style>

<script src="/socket.io/socket.io.js"></script>

<script>
    function onTypeChnage(sel){
        let ajax_source = host + "/getGameManagementDetailList?gameStatus="+ $("#searchByType option:selected").val();

        table.ajax.url(ajax_source).load();

            let ajax_source = host + "/getGameManagementDetailList?gameStatus="+ $("#searchByType option:selected").val();
            table.ajax.url(ajax_source).load();
        });

        adminSocket.on('subGameCreated',(data) => {
            let table = $("#myTable").DataTable();
            let ajax_source = host + "/getGameManagementDetailList?gameStatus=" + $("#searchByType option:selected").val();
            table.ajax.url(ajax_source).load();
        })
        

        var socket = io();

        $("#gameHeader").hide();
        $("#allGameDetails").hide();

        // clear for internal content
        $("#gameHeader").empty();
        $("#addGameID").empty();
         $('#myTable').DataTable().destroy();
        $("#myTable tbody").empty();
        $(".responsive-table").empty();
        $("#gameHeader").hide();
        $("#allGameDetails").hide();

        //::Repeat Game Modal Related Code ::
        // $('#form-Modal').on('hidden.bs.modal', function () {
        //     // Reset values of modal
        //     $(this).find('form').trigger('reset');
        // });

        //Dropdown Wise Game Details Changes
        
        $("#games").change(function() {

            // clear for internal content
            $("#gameHeader").empty();
            $("#addGameID").empty();
            $('#myTable').DataTable().destroy();
            $("#myTable tbody").empty();
            $(".responsive-table").empty();
            $("#gameHeader").hide();
            $("#allGameDetails").hide();

            // Game ID Select
            var selectedValue = $("#games option:selected").val();
            //console.log("option", selectedValue);

            // if any pervious key store so localStorage do Clear this  key
            localStorage.removeItem("selectedId");
            localStorage.clear();

            //localStorage Set
            localStorage.setItem("selectedId", selectedValue);

            if (selectedValue == "") { // if selectedValue is Blank
                // clear for internal content
                $("#gameHeader").empty();
                $("#addGameID").empty();
                $('#myTable').DataTable().destroy();
                $("#myTable tbody").empty();
                $(".responsive-table").empty();
                $("#gameHeader").hide();
                $("#allGameDetails").hide();
            } else {
                gameDetailsGet(selectedValue);
            }
        })
        .val(function() {
            //Previous Value get
            var id = localStorage.getItem("selectedId");
            //console.log("id", id);
            if (id === null) {
                $("#gameHeader").hide();
                $("#allGameDetails").hide();

                // clear for internal content
                $("#gameHeader").empty();
                $("#addGameID").empty();
                $('#myTable').DataTable().destroy();
                $("#myTable tbody").empty();
                $(".responsive-table").empty();
                $("#gameHeader").hide();
                $("#allGameDetails").hide();

            } else {
                gameDetailsGet(id);
            }

            return localStorage.getItem("selectedId");
        });

        //localStorage Clear
        // localStorage.removeItem("selectedId");
        // localStorage.clear();

        function gameDetailsGet(values) {
            var gameTypeId = values;

                type: 'GET',

                                <li class="active">' + gameData.name + ' </li>\
                            </ol>';

                                               </div>
                                               <div class="clearfix"></div>

                                    }
                                    
                                } else {

                            }

                                                ` + row.dailyScheduleId + `</a>`
                                            } else {
                                                html += row.dailyScheduleId;
                                            }
                                            return html;
                                        }

                                    },
                                    {
                                        "data": "startDate",
                                        render: function(data, type, row, meta) {
                                            return moment(row.startDate).format('DD/MM/YYYY') + "-" + moment(row.endDate).format('DD/MM/YYYY') ;

                                            html += '</div>'
                                            
                                            return html;
                                        }
                                    }

                                ];
                            } 
                            else if (gameType == "game_2") {
                                columns = [{
                                    "data": "gameId",
                                    render: function(data, type, row) {
                                        let html = ``;
                                        if (viewFlag == 'true') {
                                            html += `<a href="/viewGameDetails/` + typeId + `/` + row._id +`" title="Game Details">\
                                            ` + row.gameNumber + `</a>`
                                        } else {
                                            html += row.gameNumber;
                                        }
                                        return html;
                                    }

                                }, {
                                    "data": "gameName"
                                }, {
                                    "data": "startDate",
                                    render: function(data, type, row, meta) {
                                        console.log(row.startDate);
                                        //return moment.utc(row.startDate).format('DD/MM/YYYY hh:mm a');
                                        return moment(row.startDate).format('DD/MM/YYYY');
                                    }
                                }, {
                                    "data": "endDate",
                                    render: function (data, type, row, meta) {
                                        console.log(row.endDate);
                                        //return moment.utc(row.startDate).format('DD/MM/YYYY hh:mm a');
                                        return moment(row.endDate).format('DD/MM/YYYY');
                                    }
                                }, 
                                // {
                                //     "data": "ticketPrice"
                                //  },
                                {
                                    "data":"luckyNumberPrize"
                                }, {
                                    "data":"notificationStartTime"
                                }, {
                                    "data":"groupHalls",
                                    "render": function (data,type,row) {
                                        let $select = $('<select id="select1-' + row._id + '" ></select>', {
                                            "id": row[3],
                                            "value": data.map(item => item.name)
                                        });

                                                "text": v.name,

                                            $select.append($option);
                                        });

        let utc = new Date(now.getTime() + now.getTimezoneOffset() * 60000);
        newTime = utc.getTime() + 2 * 60000;
        console.log("start Date", newTime);
        $('#start_date').datetimepicker({
            minDate: newTime
        });
        let newTime3 = new Date();
        newTime3 = utc.getTime() + 4 * 60000;

        console.log("end Date", newTime3);
        $('#end_date').datetimepicker({
            minDate: newTime3
        });

        $.formUtils.addValidator({
            name: 'endDate',
            validatorFunction: function (value, $el, config, language, $form) {
                let startDate = document.getElementById("start_date").value;
                return value > startDate
            },
            errorMessage: 'End Period Must be greater than Start Date',
            errorMessageKey: 'endDate'
        });
        $.formUtils.addValidator({
            name: 'startDate',
            validatorFunction: function (value, $el, config, language, $form) {
                console.log(document.getElementById("end_date"));
                let graceDate = document.getElementById("end_date").value;
                if (graceDate == "") {
                    return true;
                } else {
                    console.log("start end", value, graceDate, value < graceDate);
                    return value < graceDate
                }
            },
            errorMessage: 'Start Date Must be less than End Period',
            errorMessageKey: 'startDate'
        });

        // Game 1L Popup of hall selection to chnage the master hall by admin
        // Use event delegation for dynamically added buttons
        let current_language = "{{current_language}}";
        let roleId = "{{Agent.id}}";
        // Disabled getLatestHallsOfSchedule as we will show all halls in admin
        async function getLatestHallsOfSchedule(dailyScheduleId){
            $.ajax({
                url: '/schedule/getHalls',
                method: 'GET',
                data: {
                    dailyScheduleId: dailyScheduleId
                },
                success: function(response) {
                    console.log("response", response);
                    if(response.status == "success"){
                        const selectedHalls = response.selectedHalls;
                        
                        // Update the button's data attribute
                        $(`.select-halls-btn[data-daily-schedule-id="${dailyScheduleId}"]`)
                        .attr('data-selected-halls', JSON.stringify(selectedHalls))
                        .data('selected-halls', selectedHalls);
                        populateHalls(selectedHalls);
                    }
                }
            });
        }
        $(document).on('click', '.select-halls-btn', async function() {
            // Get the data and check if it's a string
            //const selectedHallsData = $(this).data('selected-halls');
            //console.log("selectedHallsData", selectedHallsData);
            //const selectedHalls = typeof selectedHallsData === 'string' 
            //    ? JSON.parse(selectedHallsData) 
            //    : selectedHallsData;
            const dailyScheduleId = $(this).data('daily-schedule-id');
            $('#selectHallsModal').data('dailyScheduleId', dailyScheduleId);
           
            //populateHalls(selectedHalls);
            await getLatestHallsOfSchedule(dailyScheduleId);
            $('#selectHallsModal').modal('show');
        });

        function populateHalls(selectedHalls) {
            const container = $('#hallsCheckboxContainer');
            container.empty();
            
            // Create select element with single selection
            const html = `
                <select class="form-control" id="hallsSelect" data-validation="required">
                    ${selectedHalls.map(hall => `
                        <option value="${hall.id}">${hall.name}</option>
                    `).join('')}
                </select>
            `;
            container.html(html);
        }

        $('#submitHallsBtn').click(function(e) {
            e.preventDefault();
            const transferHallId = $('#hallsSelect').val(); // Get selected values from select
            const dailyScheduleId = $('#selectHallsModal').data('dailyScheduleId');
            console.log("selectedHallIds", transferHallId, dailyScheduleId);
            swal({
                title: "{{gameManage.are_you_sure}}?",
                text: "{{gameManage.do_you_want_to_transfer_hall_access}}",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#e69a2a",
                confirmButtonText: "{{gameManage.yes}}",
                cancelButtonText: "{{gameManage.cancel_button}}!",
                closeOnConfirm: false,
                closeOnCancel: true
            }, function (isConfirm) {
                if (isConfirm) {
                    adminSocket.emit("transferHallAccess", { transferHallId, hallId: roleId, current_language, actionTakenByRole: "admin", dailyScheduleId: dailyScheduleId }, function (responce) {
                        console.log("transferHallAccess responce", responce);
                        if (responce) {
                            if (responce.status == 'success') {
                                swal("{{translate.success}}", responce.message, "success");
                            } else {
                                swal("{{translate.error}}", responce.message, "error");
                            }
                        }
                    })
                }
            })
        });

        adminSocket.on("adminTrasferAccessResponse", async function (data) {
            if(data.status == "success"){
                onTypeChnage(document.getElementById("searchByType"));
                await getLatestHallsOfSchedule(data.dailyScheduleId);
                swal("Success", data.message, "success");
            }else{
                swal("Error", data.message, "error");
            }
        })

        // Toggle Auto Stop ON/OFF
        // Using event delegation in case your table is dynamic
        $(document).on('change', '.toggle-switch-input', function () {
            const $toggle = $(this);
            const isChecked = $toggle.is(':checked');
            const scheduleId = $toggle.data('daily-schedule-id');

            console.log(`Switch for Schedule ID ${scheduleId} is now`, isChecked ? 'ON' : 'OFF');

            // Send AJAX request to server
            $.ajax({
                url: '/game/auto-stop',
                method: 'POST',
                data: {
                    scheduleId,
                    status: isChecked
                },
                success: function (res) {
                    if (res.success) {
                        console.log('Status updated:', res);
                    } else {
                        // Server responded but with a failure status
                        revertToggle();
                    }
                },
                error: function (err) {
                    console.error('Error updating status', err);
                    revertToggle();
                }
            });

            // Revert toggle if error or failure
            function revertToggle() {
                $toggle.prop('checked', !isChecked);
            }
        });

        // Document over
    });
</script>
