<style>
  #addMoneyUsernameSuggestions {
      position: absolute;
      background: white;
      border: 1px solid #ccc;
      border-radius: 5px;
      max-height: 150px;
      overflow-y: auto;
      width: 97%;
      display: none;
      /* Initially hidden */
      z-index: 1000;
      left: 50%;
      transform: translateX(-50%);
  }

  .suggestion-item {
      padding: 8px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
  }

  .suggestion-item:hover {
      background-color: #f2f2f2;
  }

  /* css of add register user balance stats */
  .user-stats-table {
    border-collapse: collapse;
    background: #fff;
    border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    margin-bottom: 15px;
    width: 100%;
    max-width: 600px;
    border: 1px solid #e0e0e0;
  }
  .user-stats-table th, .user-stats-table td {
    border: none;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.5;
  }
  .user-stats-table th {
    font-weight: 600;
    color: #000;  /* Black text */
    background: #00a65a; 
    text-align: right;
    width: 50%;
  }
  .user-stats-table td {
    color: #000;  
    text-align: left;
    background: #00a65a;  /* Same green as header */
    font-weight: 500;
    padding-left: 20px;
  }
  .user-stats-table tr:nth-child(even) td {
    background: #00a65a;  /* Keep consistent green */
  }
  .user-stats-table tr:hover td {
    background: #009950;  /* Slightly darker green on hover */
  }
</style>
<!-- Add Unique Id More Ticket Modal -->
<div id="uniqueIdFinancialModal" class="modal fade" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span
             aria-hidden="true">&times;</span></button>
          <h4 class="modal-title"  id="uniqueIdFinancialModalLabel"></h4>
        </div>
 
        <div class="modal-body">
          <div class="mb-10">
            <form method="POST" id="uniqueIdBalanceForm">
                <input type="hidden" name="action" id="uniqueIdFinancialAction" value="">
                <div class="form-group">
                    <label>{{translate.enter_unique_id}}:</label>
                    <input type="text" class="form-control" name="uniqueId"
                        placeholder="{{translate.enter_unique_id}}" value=""
                        id="uniqueId" data-validation="required server">
                </div>
                <div class="form-group">
                    <label>{{translate.amount}}:</label>
                    <label id = "balanceResult" style="float: right;"></label>
                    <input type="number" class="form-control"
                        onkeypress="return event.charCode >= 48" min="1"
                        name="amount"placeholder="{{translate.enter}} {{translate.amount}}"
                        value="" id="uniqueIdFinancialAmount" data-validation="required">
                </div>
                <div class="form-group">
                    <label>{{translate.select_payment_type}}:</label>
                    <select name="paymentType" id="paymentType" class="form-control">
                        <option value="Cash">{{translate.cash}}</option>
                        <option value="Card" id="uniqueIdFinancialCardOption">{{translate.card}}</option> 
                    </select>
                </div>
                <button type="submit" class="btn btn-success" id="uniqueIdFinancialSubmitBtn"></button> 
                <button type="button" class="btn btn-danger" data-dismiss="modal">{{translate.cancel}}</button>
            </form>
          </div>
        </div>
 
        <div class="modal-footer text-center">
            <div id="uniqueIdErrorContainer" class="hidden alert alert-danger" style="text-align: center" role="alert">
            </div>
            <div id="uniqueIdSuccessContainer" class="hidden alert alert-success" style="text-align: center" role="alert">
            </div>
       </div>
      </div>
    </div>
</div>

<div id="registerUserFinancialModal" class="modal fade" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span
             aria-hidden="true">&times;</span></button>
          <h4 class="modal-title"  id="registerUserFinancialModalLabel"></h4>
        </div>
 
        <div class="modal-body">
          <div class="mb-10">
            <form method="POST" id="registerUserBalanceForm">
                <input type="hidden" name="action" id="registerUserFinancialAction" value="">
                <div class="form-group">
                    <label>{{translate.enter_username_customer_number_phone_number}}:</label>
                    <!-- <input type="text" class="form-control financialUserName" name="userName"
                        placeholder="{{translate.enter_username_customer_number_phone_number}}" value=""
                        id="registerUserFinancialUserName" data-validation="required username_server">  -->
                        
                        <input type="text" class="form-control" id="registerUserFinancialUserName" name="userName"
                        placeholder="{{translate.enter_username_customer_number_phone_number}}" autocomplete="off" data-validation="required username_server"
                        data-validation-error-msg-container="#noErrorMsg">
                    <div id="addMoneyUsernameSuggestions" ></div>

                    <input type="hidden" id="playerIdOfUsername" name="playerIdOfUsername" class="playerIdOfUsername" value="">
                </div>
                <!-- Add this new div for stats display -->
                <div class="form-group" style="text-align:center;">
                  <div id="registerUserStats" class="registerUserStats"></div>
                </div>
                <div class="form-group">
                    <label>{{translate.amount}}:</label>
                    <label id = "registerUserFinancialBalanceResult" class="registerUserFinancialBalanceResult" style="float: right;"></label>
                    <input type="number" class="form-control"
                        onkeypress="return event.charCode >= 48" min="1"
                        name="amount"placeholder="{{translate.enter}} {{translate.amount}}"
                        value="" id="registerUserFinancialAmount" data-validation="required">
                </div>
                <div class="form-group">
                    <label>{{translate.select_payment_type}}:</label>
                    <select name="paymentType" id="registerUserFinancialPaymentType" class="form-control" required >
                        <option value="Cash">{{translate.cash}}</option>
                        <option value="Card">{{translate.card}}</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success" id="registerUserFinancialSubmitBtn"></button> 
                <button type="button" class="btn btn-danger" data-dismiss="modal">{{translate.cancel}}</button>
            </form>
          </div>
        </div>
 
        <div class="modal-footer text-center">
            <div id="registerUserErrorContainer" class="hidden alert alert-danger" style="text-align: center" role="alert">
            </div>
            <div id="registerUserSuccessContainer" class="hidden alert alert-success" style="text-align: center" role="alert">
            </div>
       </div>
      </div>
    </div>
</div>
