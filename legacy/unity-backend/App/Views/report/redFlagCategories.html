{% extends "partition/layout.html" %} {% block body %}
<style>
    .wrapperSelected {
        height: 28px !important;
        border: 1px solid #ABADB3;
        margin: 0;
        padding: 4px 0 0 0;
        font-size: 14px;
    }
    .btn-group-new>.btn,
    .btn-new {
        padding: 2px 83px;
        font-size: 12px;
        line-height: 1.5;
        border-radius: 3px
    }
</style>
<!-- Main Content -->
<div class="page-wrapper">
    <div class="container-fluid">
        <div class="content-header">
            <h1>{{gameManage.red_flag_category}}</h1>
            <ol class="breadcrumb">
                <li><a href="/dashboard"><i class="fa fa-dashboard"></i> {{gameManage.dashboard}}</a></li>
                <!-- <li class="active">User profile</li> -->
            </ol>
            <div class="choose-game">
                <select id="redFlagCategory" name="redFlagCategory">
                    <option value="" selected>{{gameManage.choose_a_category_type}}</option>
                    {% for item in redFlagData %}
                    <option value="{{item.id}}">{{item.name}}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <!-- Title -->
        <section class="content-header" id="gameHeader">
        </section>
        <!-- /Title -->
        {% include "partition/notification.html" %}
        <!-- Row -->
        <section class="content" id="allGameDetails">
            <div class="row">
                <div class="col-sm-12">
                    <div class="panel panel-default card-view">
                        <div class="panel-heading" id="addGameID">
                        </div>
                        <div class="panel-wrapper collapse in">
                            <div class="panel-body">
                                <div class="row" id="amountRow">

                                </div>
                                <div class="table-wrap">
                                    <div class="table-responsive responsive-table">
                                        
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>
